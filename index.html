<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Stroomio"/>
<meta name="theme-color" content="#0d1b2a"/>
<title>Stroomio</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--navy:#0d1b2a;--navy2:#122035;--navy3:#1a2d42;--blue:#1a6fbf;--blue2:#2589e0;--accent:#4fc3f7;--success:#22c55e;--warn:#f59e0b;--danger:#ef4444;--text:#e2eaf4;--muted:#7a9bbf;--border:#1e3352;--safe-bottom:env(safe-area-inset-bottom,0px);--safe-top:env(safe-area-inset-top,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--navy);font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);overflow:hidden;}
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top);}
#header{background:var(--navy3);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
#header-logo{width:32px;height:32px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#header-title{font-size:17px;font-weight:800;color:var(--text);}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;}
#bottom-nav{background:var(--navy3);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);flex-shrink:0;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border:none;background:none;color:var(--muted);font-size:10px;font-family:inherit;font-weight:600;cursor:pointer;}
.nav-btn.active{color:var(--blue2);}
.nav-btn svg{width:22px;height:22px;}
.card{background:var(--navy2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
.card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat{background:var(--navy2);border:1px solid var(--border);border-radius:12px;padding:14px;}
.stat-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.stat-val{font-size:18px;font-weight:800;}
.row{display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);}
.row:last-child{border-bottom:none;}
.row-main{flex:1;min-width:0;}
.row-name{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;}
.badge-green{background:#22c55e22;color:#22c55e;border:1px solid #22c55e44;}
.badge-warn{background:#f59e0b22;color:#f59e0b;border:1px solid #f59e0b44;}
.badge-red{background:#ef444422;color:#ef4444;border:1px solid #ef444444;}
.badge-blue{background:#2589e022;color:#2589e0;border:1px solid #2589e044;}
.prog-wrap{background:var(--border);border-radius:99px;height:7px;overflow:hidden;}
.prog-bar{height:100%;border-radius:99px;transition:width .4s ease;}
.fab{position:fixed;right:18px;bottom:calc(70px + var(--safe-bottom));width:52px;height:52px;background:var(--blue);border-radius:16px;border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px #1a6fbf55;z-index:10;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:flex-end;}
.sheet{background:var(--navy3);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 18px calc(20px + var(--safe-bottom));}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 18px;}
.sheet-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:20px;}
label.fl{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;margin-top:14px;}
input,select,textarea{width:100%;background:var(--navy);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-size:15px;font-family:inherit;outline:none;appearance:none;-webkit-appearance:none;}
input:focus,select:focus,textarea:focus{border-color:var(--blue2);}
textarea{resize:vertical;min-height:70px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-primary{width:100%;background:var(--blue);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;margin-top:18px;}
.btn-secondary{background:var(--navy2);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:9px 14px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}
.btn-row{display:flex;gap:8px;margin-top:6px;}
.btn-sm{padding:7px;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.btn-pay{background:#22c55e22;color:#22c55e;border:1px solid #22c55e44;}
.btn-edit{background:#2589e022;color:#2589e0;border:1px solid #2589e044;}
.btn-del{background:#ef444422;color:#ef4444;border:1px solid #ef444444;}
input[type=checkbox]{width:auto;padding:0;}
.page-title{font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px;}
.page-sub{font-size:12px;color:var(--muted);margin-bottom:16px;}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:24px 0;}
.warn-box{background:#f59e0b18;border:1px solid #f59e0b44;border-radius:12px;padding:12px 14px;margin-bottom:12px;}
.warn-title{color:#f59e0b;font-weight:800;font-size:13px;margin-bottom:6px;}
.reserved-warn{font-size:10px;color:var(--warn);font-weight:700;margin-top:3px;}
.loc-card{background:var(--navy);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;}
.mw-item{background:var(--navy);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;}
.mw-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.mw-val{font-size:13px;color:var(--text);font-weight:600;margin-top:2px;}
.task-block{background:var(--navy);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;}
.subtab-wrap{display:flex;background:var(--navy2);border-radius:10px;padding:4px;margin-bottom:16px;border:1px solid var(--border);}
.subtab{flex:1;padding:9px 4px;border:none;background:none;color:var(--muted);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;border-radius:7px;}
.subtab.active{background:var(--blue);color:#fff;}
.btw-info{font-size:11px;color:var(--muted);margin-top:4px;}
.total-warn{font-size:10px;color:var(--warn);font-weight:700;margin-top:5px;display:none;}
.genel-box{background:var(--navy2);border:2px solid var(--blue);border-radius:12px;padding:14px;margin-bottom:20px;}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.page{animation:slideUp .2s ease;}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    </div>
    <div id="header-title">ZZP Fatura Takibi</div>
  </div>
  <div id="content"></div>
  <nav id="bottom-nav">
    <button class="nav-btn active" data-tab="dashboard" onclick="showTab('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </button>
    <button class="nav-btn" data-tab="invoices" onclick="showTab('invoices')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
      Faturalar
    </button>
    <button class="nav-btn" data-tab="expenses" onclick="showTab('expenses')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
      Giderler
    </button>
    <button class="nav-btn" data-tab="projects" onclick="showTab('projects')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      Projeler
    </button>
  </nav>
</div>
<script>
var TASK_TYPES=[{key:'pk',label:'Patchkast geplaatst',defaultTotal:1},{key:'ka',label:'Koper aangelegd',defaultTotal:0},{key:'om',label:'Outlet montage',defaultTotal:0},{key:'pm',label:'Patchkast montage',defaultTotal:1},{key:'km',label:'Koper meten',defaultTotal:0}];
var KOPER_KEYS=['ka','om','km'];
var INV_STATUSES=['Beklemede','Betaald','Gecikmis','Iptal'];
var PROJ_STATUSES=['Devam Ediyor','Tamamlandi','Bekliyor','Iptal'];
var BTW_RATES=['21','9','0'];
var EXP_CATS_PERSONAL=['Boodschappen','Restaurant en Eten','Kleding','Hypotheek / Huur','Elektriciteit en Gas','Water','Telefoon (Prive)','Internet (Prive)','Zorgverzekering','Auto Verzekering','Brandstof (Prive)','Abonnement / Streaming','Sport en Fitness','Reizen en Vakantie','Diger'];
var EXP_CATS_BUSINESS=['Arac ve Yakit (Zakelijk)','Alet ve Ekipman','Materiaal / Kabel','Telefoon (Zakelijk)','Internet (Zakelijk)','Yazilim ve Abonelik','Beroepsaansprakelijkheid','Pensioen','Opleiding en Cursus','Kantoorbenodigdheden','Belasting / BTW','Diger Zakelijk'];
var DB={get:function(k){try{return JSON.parse(localStorage.getItem('stroomio_'+k)||'[]');}catch(e){return[];}},set:function(k,v){localStorage.setItem('stroomio_'+k,JSON.stringify(v));}};
function fmtEUR(n){return new Intl.NumberFormat('nl-NL',{style:'currency',currency:'EUR'}).format(+n||0);}
function fmtDate(d){return d?new Date(d).toLocaleDateString('nl-NL',{day:'2-digit',month:'2-digit',year:'numeric'}):'-';}
function today(){return new Date().toISOString().split('T')[0];}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function pa(val){if(!val&&val!==0)return 0;return parseFloat(String(val).replace(',','.'))||0;}
function calcBTWFromEx(a,r){return Math.round(pa(a)*pa(r)/100*100)/100;}
function getTaskPct(task){if(!task)return 0;if(task.nvt)return 0;if(task.done!==undefined){var t=+task.total||1;return t>0?Math.min(Math.round(+task.done/t*100),100):0;}return +task.pct||0;}
function calcLocatiePct(l){var tasks=l.tasks||{};var tot=0,cnt=0;TASK_TYPES.forEach(function(t){var task=tasks[t.key]||{done:0,total:1,nvt:false};if(!task.nvt){tot+=getTaskPct(task);cnt++;}});return cnt>0?Math.round(tot/cnt):100;}
function calcProjectPct(p){var locs=p.locaties||[];if(!locs.length)return 0;var tot=0;locs.forEach(function(l){tot+=calcLocatiePct(l);});return Math.round(tot/locs.length);}

function checkAutoBetaald(){var inv=DB.get('invoices');var ts=today();var am=[];var upd=inv.map(function(i){if(i.status==='Beklemede'&&i.dueDate&&i.dueDate<=ts){am.push({name:i.client,amt:i.amount});i.status='Betaald';i.autoMarked=true;return i;}return i;});if(am.length){DB.set('invoices',upd);sessionStorage.setItem('stroomio_notify',JSON.stringify(am));}}
function notifyBanner(){var raw=sessionStorage.getItem('stroomio_notify');if(!raw)return'';var list=JSON.parse(raw);if(!list.length)return'';var items=list.map(function(x){return'<div style="font-size:12px;color:var(--text);padding:2px 0">- '+x.name+' '+fmtEUR(x.amt)+'</div>';}).join('');return'<div id="notify-banner" class="warn-box"><div style="display:flex;justify-content:space-between"><div><div class="warn-title">Otomatik Betaald yapildi!</div>'+items+'<div style="font-size:11px;color:var(--muted);margin-top:6px">Bu faturalarin gercekten yattigini kontrol et!</div></div><button onclick="dismissNotify()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px">x</button></div></div>';}
function dismissNotify(){sessionStorage.removeItem('stroomio_notify');var el=document.getElementById('notify-banner');if(el)el.remove();}
function badge(s){var m={'Betaald':'badge-green','Beklemede':'badge-warn','Gecikmis':'badge-red','Iptal':'badge-red','Devam Ediyor':'badge-blue','Tamamlandi':'badge-green','Bekliyor':'badge-warn'};return'<span class="badge '+(m[s]||'badge-blue')+'">'+s+'</span>';}
function prog(p){var c=p>=100?'var(--success)':'var(--blue2)';return'<div class="prog-wrap"><div class="prog-bar" style="width:'+Math.min(p,100)+'%;background:'+c+'"></div></div>';}
function addFab(fn){var f=document.createElement('button');f.className='fab';f.innerHTML='<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';f.onclick=fn;document.body.appendChild(f);}
function openSheet(html){var ov=document.createElement('div');ov.className='overlay';ov.innerHTML='<div class="sheet"><div class="sheet-handle"></div>'+html+'</div>';ov.addEventListener('click',function(e){if(e.target===ov)closeSheet();});document.body.appendChild(ov);}
function closeSheet(){var o=document.querySelectorAll('.overlay');if(o.length)o[o.length-1].remove();}
function showTab(tab){document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.toggle('active',b.dataset.tab===tab);});var el=document.getElementById('content');el.scrollTop=0;el.innerHTML='';var fab=document.querySelector('.fab');if(fab)fab.remove();if(tab==='dashboard')renderDashboard();else if(tab==='invoices')renderInvoices();else if(tab==='expenses')renderExpenses();else if(tab==='projects')renderProjects();}

// ==================== DASHBOARD ====================
function renderDashboard(){
  var inv=DB.get('invoices'),expP=DB.get('exp_personal'),expB=DB.get('exp_business'),pro=DB.get('projects');
  var paid=inv.filter(function(i){return i.status==='Betaald';}).reduce(function(s,i){return s+pa(i.amount);},0);
  var pend=inv.filter(function(i){return i.status==='Beklemede';}).reduce(function(s,i){return s+pa(i.amount);},0);
  var totalExp=expP.reduce(function(s,e){return s+pa(e.amount);},0)+expB.reduce(function(s,e){return s+pa(e.amount);},0);
  var net=paid-totalExp;var activeP=pro.filter(function(p){return calcProjectPct(p)<100;}).length;
  var reservedTotal=inv.filter(function(i){return i.status==='Betaald'&&i.reserved30;}).reduce(function(s,i){return s+pa(i.amount)*0.3;},0);
  var unreserved=inv.filter(function(i){return i.status==='Betaald'&&!i.reserved30;});
  var unreservedHtml='';
  if(unreserved.length){var uI=unreserved.map(function(i){return'<div style="display:flex;justify-content:space-between;padding:3px 0"><span style="font-size:12px;color:var(--text)">'+i.client+'</span><span style="font-size:12px;color:var(--warn);font-weight:700">'+fmtEUR(pa(i.amount)*0.3)+' ayrilmadi</span></div>';}).join('');unreservedHtml='<div class="warn-box"><div class="warn-title">%30 Ayrilmamis Odemeler</div>'+uI+'</div>';}
  var recent=inv.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);}).slice(0,5);
  var recentRows=recent.map(function(i){var warn30=(i.status==='Betaald'&&!i.reserved30)?'<div class="reserved-warn">%30 ayrilmadi</div>':'';return'<div class="row"><div class="row-main"><div class="row-name">'+i.client+'</div><div class="row-sub">'+i.invoiceNo+' - '+fmtDate(i.date)+'</div></div><div style="text-align:right;flex-shrink:0"><div style="font-size:14px;font-weight:800;color:var(--text)">'+fmtEUR(pa(i.amount))+'</div>'+badge(i.status)+warn30+'</div></div>';}).join('')||'<div class="empty">Henuz fatura yok</div>';
  var proRows=pro.slice(0,4).map(function(p){var pct=calcProjectPct(p);var col=pct>=100?'var(--success)':'var(--accent)';return'<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:13px;font-weight:700;color:var(--text)">'+p.name+'</span><span style="font-size:13px;font-weight:800;color:'+col+'">'+pct+'%</span></div>'+prog(pct)+'</div>';}).join('')||'<div class="empty">Henuz proje yok</div>';
  var netColor=net>=0?'var(--success)':'var(--danger)';
  document.getElementById('content').innerHTML='<div class="page"><div class="page-title">Dashboard</div><div class="stat-grid" style="margin-top:12px"><div class="stat"><div class="stat-label">Toplam Gelir</div><div class="stat-val" style="color:var(--success)">'+fmtEUR(paid)+'</div></div><div class="stat"><div class="stat-label">Bekleyen</div><div class="stat-val" style="color:var(--warn)">'+fmtEUR(pend)+'</div></div><div class="stat"><div class="stat-label">Giderler</div><div class="stat-val" style="color:var(--danger)">'+fmtEUR(totalExp)+'</div></div><div class="stat"><div class="stat-label">Net Kar</div><div class="stat-val" style="color:'+netColor+'">'+fmtEUR(net)+'</div></div></div><div class="stat-grid"><div class="stat" style="border-color:#4fc3f744"><div class="stat-label">30% Rezerv</div><div class="stat-val" style="color:var(--accent);font-size:16px">'+fmtEUR(reservedTotal)+'</div><div style="font-size:10px;color:var(--muted);margin-top:3px">Emeklilik ve Vergi</div></div><div class="stat"><div class="stat-label">Aktif Proje</div><div class="stat-val" style="color:var(--blue2)">'+activeP+'</div></div></div>'+unreservedHtml+'<div class="card"><div class="card-title">Son Faturalar</div>'+recentRows+'</div><div class="card"><div class="card-title">Proje Durumu</div>'+proRows+'</div></div>';
}

// ==================== INVOICES ====================
function renderInvoices(){
  var inv=DB.get('invoices');
  var total=inv.reduce(function(s,i){return s+pa(i.amount);},0);
  var paid=inv.filter(function(i){return i.status==='Betaald';}).reduce(function(s,i){return s+pa(i.amount);},0);
  var rows=inv.map(function(i){
    var res=i.reserved30?'<div style="font-size:10px;color:var(--success);margin-top:3px;font-weight:700">%30 Ayrildi ('+fmtEUR(pa(i.amount)*0.3)+')</div>':(i.status==='Betaald'?'<div class="reserved-warn">%30 Ayrilmadi</div>':'');
    var payBtn=i.status!=='Betaald'?'<button class="btn-sm btn-pay" onclick="markPaid(\''+i.id+'\')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></button>':'';
    var desc=i.description?'<div class="row-sub">'+i.description+'</div>':'';
    var due=i.dueDate?' - Son: '+fmtDate(i.dueDate):'';
    return'<div class="row"><div class="row-main"><div class="row-name">'+i.client+'</div><div class="row-sub">'+i.invoiceNo+' - '+fmtDate(i.date)+due+'</div>'+desc+res+'</div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0"><div style="font-size:15px;font-weight:800;color:var(--text)">'+fmtEUR(pa(i.amount))+'</div>'+badge(i.status)+'<div class="btn-row" style="margin-top:0">'+payBtn+'<button class="btn-sm btn-edit" onclick="editInvoice(\''+i.id+'\')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4z"/></svg></button><button class="btn-sm btn-del" onclick="delInvoice(\''+i.id+'\')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg></button></div></div></div>';
  }).join('')||'<div class="empty">Henuz fatura eklenmedi</div>';
  document.getElementById('content').innerHTML='<div class="page"><div class="page-title">Faturalar</div><div class="page-sub">'+inv.length+' fatura - '+fmtEUR(paid)+' tahsil edildi</div><div class="stat-grid" style="margin-bottom:12px"><div class="stat"><div class="stat-label">Toplam</div><div class="stat-val" style="color:var(--text);font-size:15px">'+fmtEUR(total)+'</div></div><div class="stat"><div class="stat-label">Tahsil</div><div class="stat-val" style="color:var(--success);font-size:15px">'+fmtEUR(paid)+'</div></div></div><div class="card">'+rows+'</div><div style="height:70px"></div></div>';
  addFab(function(){openInvoiceForm(null);});
}
function openInvoiceForm(inv){
  var isEdit=!!inv;
  var d=inv||{client:'',invoiceNo:'STR-'+Date.now().toString().slice(-4),date:today(),dueDate:'',amount:'',status:'Beklemede',description:'',reserved30:false};

function generateBTWReport(){var q=+document.getElementById('btw-q').value;var year=+document.getElementById('btw-y').value;var qs=['','01-01','04-01','07-01','10-01'];var qe=['','03-31','06-30','09-30','12-31'];var qStart=year+'-'+qs[q];var qEnd=year+'-'+qe[q];var qNames=['','Q1 (Januari - Maart)','Q2 (April - Juni)','Q3 (Juli - September)','Q4 (Oktober - December)'];var biz=DB.get('exp_business').filter(function(e){return e.date>=qStart&&e.date<=qEnd;});var voorEx=biz.reduce(function(s,e){return s+pa(e.amount);},0);var voorBTW=biz.reduce(function(s,e){return s+pa(e.btwAmount||0);},0);var expRows=biz.map(function(e){var b=pa(e.btwAmount||0);var t=pa(e.amount)+b;return'<tr><td>'+fmtDate(e.date)+'</td><td>'+e.description+'</td><td>'+e.category+'</td><td style="text-align:right">'+fmtEUR(pa(e.amount))+'</td><td style="text-align:right">'+(e.btwRate||0)+'%</td><td style="text-align:right">'+fmtEUR(b)+'</td><td style="text-align:right">'+fmtEUR(t)+'</td></tr>';}).join('');var html='<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>BTW Aangifte '+qNames[q]+' '+year+'</title><style>body{font-family:Arial,sans-serif;font-size:12px;margin:20px;color:#111;}h1{font-size:20px;color:#0d1b2a;}h2{font-size:14px;color:#1a6fbf;margin:20px 0 8px;border-bottom:2px solid #1a6fbf;padding-bottom:4px;}table{width:100%;border-collapse:collapse;margin-bottom:16px;}th{background:#0d1b2a;color:#fff;padding:7px 8px;text-align:left;font-size:11px;}td{padding:6px 8px;border-bottom:1px solid #e5e7eb;font-size:11px;}.sum-box{background:#f3f4f6;border:1px solid #d1d5db;border-radius:8px;padding:16px;margin:16px 0;max-width:420px;}.sum-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid #e5e7eb;}.sum-note{font-size:11px;color:#666;padding:6px 0;border-bottom:1px solid #e5e7eb;}.sum-total{display:flex;justify-content:space-between;padding:10px 0 0;font-size:16px;font-weight:bold;color:#16a34a;}.print-btn{background:#1a6fbf;color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:14px;margin-bottom:16px;}@media print{.print-btn{display:none;}}</style></head><body><button class="print-btn" onclick="window.print()">Yazdir / PDF Olarak Kaydet</button><h1>BTW Aangifte - ZZP Fatura Takibi</h1><p>Periode: <strong>'+qNames[q]+' '+year+'</strong></p><div class="sum-box"><div class="sum-row"><span>1a. Omzetbelasting:</span><span>0,00</span></div><div class="sum-note">Reden: BTW verlegd - u hoeft geen omzetbelasting af te dragen</div><div class="sum-row"><span>Zakelijke kosten (ex BTW):</span><span>'+fmtEUR(voorEx)+'</span></div><div class="sum-row"><span>5b. Voorbelasting (BTW op zakelijke kosten):</span><span>'+fmtEUR(voorBTW)+'</span></div><div class="sum-total"><span>Terug te ontvangen:</span><span>'+fmtEUR(voorBTW)+'</span></div></div><h2>Zakelijke Kosten (Voorbelasting)</h2><table><thead><tr><th>Datum</th><th>Omschrijving</th><th>Categorie</th><th>Ex BTW</th><th>BTW %</th><th>BTW</th><th>Totaal</th></tr></thead><tbody>'+(expRows||'<tr><td colspan="7" style="text-align:center;color:#888">Geen kosten in deze periode</td></tr>')+'</tbody></table><p style="font-size:10px;color:#888;margin-top:20px">ZZP Fatura Takibi | Disclaimer: Vergi danismaniyla teyit ediniz.</p></body></html>';var w=window.open('','_blank');if(w){w.document.write(html);w.document.close();}else{alert('Pop-up engellendi. Safari ayarlarinda pop-up izni ver.');}closeSheet();}

}
function openProjectForm(p){
  var isEdit=!!p;var d=p||{name:'',client:'',startDate:today(),endDate:'',status:'Devam Ediyor',value:'',notes:''};
  var sOpts=PROJ_STATUSES.map(function(s){return'<option'+(s===d.status?' selected':'')+'>'+s+'</option>';}).join('');
  var valStr=d.value?String(d.value).replace('.',','):'';
  openSheet('<div class="sheet-title">'+(isEdit?'Proje Duzenle':'Yeni Proje')+'</div><label class="fl">Proje Adi</label><input id="p-name" value="'+d.name+'" placeholder="Harvest House..."/><label class="fl">Musteri</label><input id="p-client" value="'+(d.client||'')+'" placeholder="Musteri Adi"/><div class="grid2"><div><label class="fl">Baslangic</label><input type="date" id="p-start" value="'+d.startDate+'"/></div><div><label class="fl">Bitis</label><input type="date" id="p-end" value="'+(d.endDate||'')+'"/></div></div><label class="fl">Proje Degeri (EUR)</label><input type="text" inputmode="decimal" id="p-val" value="'+valStr+'" placeholder="0,00"/><label class="fl">Durum</label><select id="p-status">'+sOpts+'</select><label class="fl">Notlar</label><textarea id="p-notes" placeholder="Proje detaylari...">'+(d.notes||'')+'</textarea><button class="btn-primary" onclick="saveProject(\''+(isEdit?d.id:'')+'\''+')">'+(isEdit?'Guncelle':'Kaydet')+'</button>');
}
function saveProject(id){var pro=DB.get('projects');var existing=id?pro.filter(function(p){return p.id===id;})[0]:null;var item={id:id||uid(),name:(document.getElementById('p-name')||{}).value||'',client:(document.getElementById('p-client')||{}).value||'',startDate:(document.getElementById('p-start')||{}).value||'',endDate:(document.getElementById('p-end')||{}).value||'',value:pa((document.getElementById('p-val')||{}).value),status:(document.getElementById('p-status')||{}).value||'',notes:(document.getElementById('p-notes')||{}).value||'',locaties:existing?existing.locaties||[]:[],meerwerk:existing?existing.meerwerk||[]:[],};if(!item.name)return;if(calcProjectPct(item)>=100)item.status='Tamamlandi';var updated=id?pro.map(function(p){return p.id===id?item:p;}):[item].concat(pro);DB.set('projects',updated);closeSheet();renderProjects();}

function openProjectDetail(id){
  var p=DB.get('projects').filter(function(x){return x.id===id;})[0];if(!p)return;
  var locs=p.locaties||[];var mw=p.meerwerk||[];var pct=calcProjectPct(p);var pctCol=pct>=100?'var(--success)':'var(--accent)';
  var locHtml=locs.map(function(l){
    var lpct=calcLocatiePct(l);var lcol=lpct>=100?'var(--success)':'var(--blue2)';
    var taskSummary=TASK_TYPES.map(function(t){var task=l.tasks&&l.tasks[t.key]?l.tasks[t.key]:{done:0,total:1,nvt:false};if(task.nvt)return'<span style="font-size:10px;color:var(--muted)">'+t.label.split(' ')[0]+': NVT</span>';var tpct=getTaskPct(task);var dv=task.done!==undefined?task.done:0;var tv=task.total||1;return'<span style="font-size:10px;color:var(--muted)">'+t.label.split(' ')[0]+': '+dv+'/'+tv+' ('+tpct+'%)</span>';}).join(' | ');
    return'<div class="loc-card" onclick="openLocatieDetail(\''+id+'\',\''+l.id+'\')"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div><div style="font-size:13px;font-weight:700;color:var(--text)">'+l.name+'</div><div style="font-size:11px;color:var(--muted)">'+l.patchkast+(l.type?' - '+l.type:'')+(l.aantal?' | Toplam: '+l.aantal:'')+'</div></div><span style="font-size:15px;font-weight:800;color:'+lcol+'">'+lpct+'%</span></div>'+prog(lpct)+'<div style="margin-top:8px;line-height:2">'+taskSummary+'</div></div>';
  }).join('')||'<div class="empty">Locatie eklemek icin + Locatie tusuna bas</div>';
  var mwHtml=mw.map(function(m,i){var matH=m.materials?'<div><div class="mw-label">Malzeme</div><div class="mw-val">'+m.materials+'</div></div>':'';var hrH=m.hours?'<div><div class="mw-label">Sure</div><div class="mw-val">'+m.hours+' saat</div></div>':'';var cstH=m.cost?'<div><div class="mw-label">Maliyet</div><div class="mw-val" style="color:var(--warn)">'+fmtEUR(pa(m.cost))+'</div></div>':'';return'<div class="mw-item"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1"><div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:8px">'+m.description+'</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+matH+hrH+cstH+'<div><div class="mw-label">Tarih</div><div class="mw-val">'+fmtDate(m.date)+'</div></div></div></div><button onclick="delMeerwerk(\''+id+'\','+i+')" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:20px;padding:0 0 0 10px">x</button></div></div>';}).join('')||'<div class="empty">Henuz meerwerk eklenmedi</div>';
  var valH=p.value?fmtEUR(pa(p.value)):'-';var notesH=p.notes?'<div style="margin-top:16px"><div class="card-title">Notlar</div><div class="stat" style="padding:12px;white-space:pre-wrap;font-size:13px;color:var(--text)">'+p.notes+'</div></div>':'';
  openSheet('<div class="sheet-title">'+p.name+'</div><div class="grid2" style="margin-bottom:14px"><div class="stat" style="padding:10px 12px"><div class="stat-label">Musteri</div><div style="font-size:13px;font-weight:700;color:var(--text)">'+(p.client||'-')+'</div></div><div class="stat" style="padding:10px 12px"><div class="stat-label">Deger</div><div style="font-size:13px;font-weight:700;color:var(--success)">'+valH+'</div></div><div class="stat" style="padding:10px 12px"><div class="stat-label">Baslangic</div><div style="font-size:12px;color:var(--text)">'+fmtDate(p.startDate)+'</div></div><div class="stat" style="padding:10px 12px"><div class="stat-label">Bitis</div><div style="font-size:12px;color:var(--text)">'+fmtDate(p.endDate)+'</div></div></div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:13px;font-weight:700;color:var(--text)">Genel Ilerleme</span><span style="font-size:18px;font-weight:800;color:'+pctCol+'">'+pct+'%</span></div>'+prog(pct)+'<div style="margin-top:20px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div class="card-title" style="margin-bottom:0">Locaties ('+locs.length+')</div><button onclick="openAddLocatie(\''+id+'\')" class="btn-secondary" style="font-size:12px;padding:7px 12px">+ Locatie</button></div>'+locHtml+'</div><div style="margin-top:20px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div class="card-title" style="margin-bottom:0">Meerwerk</div><button onclick="openMeerwerkForm(\''+id+'\')" class="btn-secondary" style="font-size:12px;padding:7px 12px">+ Ekle</button></div>'+mwHtml+'</div>'+notesH);
}

// ==================== ADD LOCATIE (geen aantal) ====================
function openAddLocatie(projectId){
  openSheet('<div class="sheet-title">Locatie Ekle</div><label class="fl">Locatie Adi</label><input id="loc-name" placeholder="Locatie adi..."/><div class="grid2"><div><label class="fl">Patchkast Kodu</label><input id="loc-pk" placeholder="H1, H2..."/></div><div><label class="fl">Type</label><input id="loc-type" placeholder="Wandkast 16HE..."/></div></div><button class="btn-primary" onclick="saveLocatie(\''+projectId+'\')">Ekle</button>');
}
function saveLocatie(projectId){
  var name=(document.getElementById('loc-name')||{}).value;if(!name||!name.trim())return;
  var pro=DB.get('projects');var p=pro.filter(function(x){return x.id===projectId;})[0];if(!p)return;
  if(!Array.isArray(p.locaties))p.locaties=[];
  var defaultTasks={};
  TASK_TYPES.forEach(function(t){defaultTasks[t.key]={done:0,total:1,nvt:false};});
  p.locaties.push({id:uid(),name:name.trim(),patchkast:(document.getElementById('loc-pk')||{}).value||'',type:(document.getElementById('loc-type')||{}).value||'',aantal:1,tasks:defaultTasks});
  DB.set('projects',pro);closeSheet();openProjectDetail(projectId);
}

// ==================== LOCATIE DETAIL (genel toplam system) ====================
function openLocatieDetail(projectId, locatieId){
  var pro=DB.get('projects');var p=pro.filter(function(x){return x.id===projectId;})[0];if(!p)return;
  var l=(p.locaties||[]).filter(function(x){return x.id===locatieId;})[0];if(!l)return;
  var genelToplam=+l.aantal||1;
  var tasksHtml=TASK_TYPES.map(function(t){
    var task=l.tasks&&l.tasks[t.key]?l.tasks[t.key]:{done:0,total:(t.key==='pk'||t.key==='pm')?1:genelToplam,nvt:false};
    var nvtChecked=task.nvt?'checked':'';
    var done=task.done!==undefined?+task.done:0;
    var total=task.total!==undefined?+task.total:(t.key==='pk'||t.key==='pm'?1:genelToplam);
    var pct=total>0?Math.min(Math.round(done/total*100),100):0;
    var pctLabel=task.nvt?'NVT':pct+'%';var pctColor=pct>=100?'var(--success)':'var(--accent)';
    var disStyle=task.nvt?'opacity:0.4;pointer-events:none':'';
    var isKoper=KOPER_KEYS.indexOf(t.key)>=0;
    var warnDisplay=(isKoper&&!task.nvt&&total!==genelToplam)?'block':'none';
    return'<div class="task-block"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-size:14px;font-weight:700;color:var(--text)">'+t.label+'</span><div style="display:flex;align-items:center;gap:10px"><label style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);cursor:pointer"><input type="checkbox" id="nvt-'+t.key+'" '+nvtChecked+' style="width:16px;height:16px;accent-color:var(--muted)" onchange="toggleNVT(\''+t.key+'\')"/> N.v.t.</label><span id="pct-label-'+t.key+'" style="font-size:18px;font-weight:800;color:'+pctColor+';min-width:55px;text-align:right">'+pctLabel+'</span></div></div><div style="'+disStyle+'" id="inputs-'+t.key+'"><div class="grid2"><div><label class="fl" style="margin-top:0">GEDAAN</label><input type="text" inputmode="numeric" id="done-'+t.key+'" value="'+done+'" style="text-align:center;font-size:22px;font-weight:800" oninput="updateTaskPct(\''+t.key+'\')"/></div><div><label class="fl" style="margin-top:0">TOTAAL</label><input type="text" inputmode="numeric" id="total-'+t.key+'" value="'+total+'" style="text-align:center;font-size:22px;font-weight:800" oninput="onTotalChange(\''+t.key+'\')"/></div></div>'+(isKoper?'<div id="total-warn-'+t.key+'" class="total-warn" style="display:'+warnDisplay+'">Genel toplam ile farkli!</div>':'')+'</div></div>';
  }).join('');
  openSheet('<div class="sheet-title">'+l.name+'</div><div style="font-size:12px;color:var(--muted);margin-bottom:16px">'+l.patchkast+(l.type?' - '+l.type:'')+'</div><div class="genel-box"><label style="display:block;font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Genel Toplam (Aansluitingen)</label><input type="text" inputmode="numeric" id="genel-toplam" value="'+genelToplam+'" style="font-size:24px;font-weight:800;text-align:center;border-color:var(--blue)" oninput="onGenelToplamChange()"/><div style="font-size:11px;color:var(--muted);margin-top:8px">Bu sayi Koper ve Outlet gorevleri icin otomatik toplam olarak kullanilir</div></div>'+tasksHtml+'<button class="btn-primary" onclick="saveLocatieTasks(\''+projectId+'\',\''+locatieId+'\')">Kaydet</button><button onclick="delLocatie(\''+projectId+'\',\''+locatieId+'\')" style="width:100%;background:none;border:none;color:var(--danger);font-size:13px;font-family:inherit;cursor:pointer;margin-top:14px;padding:10px">Bu Locatieyi Sil</button>');
}

function onGenelToplamChange(){
  var gt=+(document.getElementById('genel-toplam')||{}).value||1;
  KOPER_KEYS.forEach(function(key){
    var tEl=document.getElementById('total-'+key);
    if(tEl){tEl.value=gt;updateTaskPct(key);checkTotalWarn(key,gt);}
  });
}

function onTotalChange(key){
  updateTaskPct(key);
  var gt=+(document.getElementById('genel-toplam')||{}).value||1;
  checkTotalWarn(key,gt);
}

function checkTotalWarn(key,gt){
  var tEl=document.getElementById('total-'+key);
  var warn=document.getElementById('total-warn-'+key);
  if(!tEl||!warn)return;
  var isDiff=+tEl.value!==gt;
  warn.style.display=isDiff?'block':'none';
}

function updateTaskPct(key){
  var done=+(document.getElementById('done-'+key)||{}).value||0;
  var total=+(document.getElementById('total-'+key)||{}).value||1;
  var pct=total>0?Math.min(Math.round(done/total*100),100):0;
  var lbl=document.getElementById('pct-label-'+key);
  if(lbl){lbl.textContent=pct+'%';lbl.style.color=pct>=100?'var(--success)':'var(--accent)';}
}
function toggleNVT(key){
  var cb=document.getElementById('nvt-'+key);var inputs=document.getElementById('inputs-'+key);var lbl=document.getElementById('pct-label-'+key);if(!cb)return;
  if(cb.checked){if(inputs){inputs.style.opacity='0.4';inputs.style.pointerEvents='none';}if(lbl)lbl.textContent='NVT';}
  else{if(inputs){inputs.style.opacity='1';inputs.style.pointerEvents='';}updateTaskPct(key);}
}
function saveLocatieTasks(projectId,locatieId){
  var pro=DB.get('projects');var p=pro.filter(function(x){return x.id===projectId;})[0];if(!p)return;
  var lIdx=-1;(p.locaties||[]).forEach(function(l,i){if(l.id===locatieId)lIdx=i;});if(lIdx<0)return;
  var gtEl=document.getElementById('genel-toplam');var newAantal=gtEl?+gtEl.value:p.locaties[lIdx].aantal;
  p.locaties[lIdx].aantal=newAantal;
  var newTasks={};
  TASK_TYPES.forEach(function(t){var dEl=document.getElementById('done-'+t.key);var tEl=document.getElementById('total-'+t.key);var cb=document.getElementById('nvt-'+t.key);newTasks[t.key]={done:dEl?+dEl.value:0,total:tEl?+tEl.value:1,nvt:cb?cb.checked:false};});
  p.locaties[lIdx].tasks=newTasks;
  if(calcProjectPct(p)>=100)p.status='Tamamlandi';
  DB.set('projects',pro);closeSheet();openProjectDetail(projectId);
}
function delLocatie(projectId,locatieId){if(!confirm('Bu locatieyi silmek istiyor musun?'))return;var pro=DB.get('projects');var p=pro.filter(function(x){return x.id===projectId;})[0];if(!p)return;p.locaties=(p.locaties||[]).filter(function(l){return l.id!==locatieId;});DB.set('projects',pro);closeSheet();openProjectDetail(projectId);}

function openMeerwerkForm(projectId){openSheet('<div class="sheet-title">Meerwerk Ekle</div><label class="fl">Aciklama</label><input id="mw-desc" placeholder="Ekstra kablo cekimi, ek switch..."/><label class="fl">Kullanilan Malzeme</label><input id="mw-mat" placeholder="2x Cat6a kablo..."/><div class="grid2"><div><label class="fl">Sure (saat)</label><input type="text" inputmode="decimal" id="mw-hours" placeholder="0,0"/></div><div><label class="fl">Maliyet (EUR)</label><input type="text" inputmode="decimal" id="mw-cost" placeholder="0,00"/></div></div><label class="fl">Tarih</label><input type="date" id="mw-date" value="'+today()+'"/><button class="btn-primary" onclick="saveMeerwerk(\''+projectId+'\')">Kaydet</button>');}
function saveMeerwerk(projectId){var desc=(document.getElementById('mw-desc')||{}).value;if(!desc||!desc.trim())return;var pro=DB.get('projects');var p=pro.filter(function(x){return x.id===projectId;})[0];if(!p)return;if(!Array.isArray(p.meerwerk))p.meerwerk=[];p.meerwerk.push({id:uid(),description:desc.trim(),materials:(document.getElementById('mw-mat')||{}).value||'',hours:(document.getElementById('mw-hours')||{}).value||'',cost:pa((document.getElementById('mw-cost')||{}).value),date:(document.getElementById('mw-date')||{}).value||''});DB.set('projects',pro);closeSheet();closeSheet();openProjectDetail(projectId);}
function delMeerwerk(projectId,index){if(!confirm('Bu meerwerk kaydini silmek istiyor musun?'))return;var pro=DB.get('projects');var p=pro.filter(function(x){return x.id===projectId;})[0];if(!p||!Array.isArray(p.meerwerk))return;p.meerwerk.splice(index,1);DB.set('projects',pro);closeSheet();openProjectDetail(projectId);}
function editProject(id){var p=DB.get('projects').filter(function(x){return x.id===id;})[0];if(p)openProjectForm(p);}
function delProject(id){if(!confirm('Bu projeyi silmek istiyor musun?'))return;DB.set('projects',DB.get('projects').filter(function(p){return p.id!==id;}));renderProjects();}

checkAutoBetaald();
showTab('dashboard');
</script>

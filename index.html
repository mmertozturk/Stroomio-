<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Stroomio"/>
<meta name="theme-color" content="#0d1b2a"/>
<title>Stroomio</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--navy:#0d1b2a;--navy2:#122035;--navy3:#1a2d42;--blue:#1a6fbf;--blue2:#2589e0;--accent:#4fc3f7;--success:#22c55e;--warn:#f59e0b;--danger:#ef4444;--text:#e2eaf4;--muted:#7a9bbf;--border:#1e3352;--safe-bottom:env(safe-area-inset-bottom,0px);--safe-top:env(safe-area-inset-top,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--navy);font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);overflow:hidden;}
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top);}
#header{background:var(--navy3);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
#header-logo{width:32px;height:32px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#header-title{font-size:17px;font-weight:800;color:var(--text);}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;}
#bottom-nav{background:var(--navy3);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);flex-shrink:0;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 2px;border:none;background:none;color:var(--muted);font-size:9px;font-family:inherit;font-weight:600;cursor:pointer;}
.nav-btn.active{color:var(--blue2);}
.nav-btn svg{width:20px;height:20px;}
.card{background:var(--navy2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
.card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat{background:var(--navy2);border:1px solid var(--border);border-radius:12px;padding:14px;}
.stat-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.stat-val{font-size:18px;font-weight:800;}
.row{display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);}
.row:last-child{border-bottom:none;}
.row-main{flex:1;min-width:0;}
.row-name{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;}
.badge-green{background:#22c55e22;color:#22c55e;border:1px solid #22c55e44;}
.badge-warn{background:#f59e0b22;color:#f59e0b;border:1px solid #f59e0b44;}
.badge-red{background:#ef444422;color:#ef4444;border:1px solid #ef444444;}
.badge-blue{background:#2589e022;color:#2589e0;border:1px solid #2589e044;}
.prog-wrap{background:var(--border);border-radius:99px;height:7px;overflow:hidden;}
.prog-bar{height:100%;border-radius:99px;transition:width .4s ease;}
.fab{position:fixed;right:18px;bottom:calc(70px + var(--safe-bottom));width:52px;height:52px;background:var(--blue);border-radius:16px;border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px #1a6fbf55;z-index:10;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:flex-end;}
.sheet{background:var(--navy3);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 18px calc(20px + var(--safe-bottom));}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 18px;}
.sheet-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.sheet-title{font-size:17px;font-weight:800;color:var(--text);}
.sheet-close{background:var(--navy2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--muted);cursor:pointer;font-size:13px;font-family:inherit;}
label.fl{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;margin-top:14px;}
input,select,textarea{width:100%;background:var(--navy);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-size:15px;font-family:inherit;outline:none;appearance:none;-webkit-appearance:none;}
input:focus,select:focus,textarea:focus{border-color:var(--blue2);}
textarea{resize:vertical;min-height:60px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-primary{width:100%;background:var(--blue);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;margin-top:18px;}
.btn-green{width:100%;background:var(--success);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;margin-top:10px;}
.btn-secondary{background:var(--navy2);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:9px 14px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}
.btn-row{display:flex;gap:8px;margin-top:6px;}
.btn-sm{padding:7px;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.btn-pay{background:#22c55e22;color:#22c55e;border:1px solid #22c55e44;}
.btn-edit{background:#2589e022;color:#2589e0;border:1px solid #2589e044;}
.btn-del{background:#ef444422;color:#ef4444;border:1px solid #ef444444;}
.chk-row{display:flex;align-items:center;gap:14px;background:var(--navy);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:14px;cursor:pointer;}
.chk-box{width:24px;height:24px;border-radius:6px;border:2px solid var(--blue2);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.chk-box.checked{background:var(--success);border-color:var(--success);}
.page-title{font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px;}
.page-sub{font-size:12px;color:var(--muted);margin-bottom:16px;}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:24px 0;}
.warn-box{background:#f59e0b18;border:1px solid #f59e0b44;border-radius:12px;padding:12px 14px;margin-bottom:12px;}
.warn-title{color:#f59e0b;font-weight:800;font-size:13px;margin-bottom:6px;}
.reserved-warn{font-size:10px;color:var(--warn);font-weight:700;margin-top:3px;}
.loc-card{background:var(--navy);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;}
.mw-item{background:var(--navy);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;}
.mw-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.mw-val{font-size:13px;color:var(--text);font-weight:600;margin-top:2px;}
.task-block{background:var(--navy);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;}
.subtab-wrap{display:flex;background:var(--navy2);border-radius:10px;padding:4px;margin-bottom:16px;border:1px solid var(--border);}
.subtab{flex:1;padding:9px 4px;border:none;background:none;color:var(--muted);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;border-radius:7px;}
.subtab.active{background:var(--blue);color:#fff;}
.btw-info{font-size:11px;color:var(--muted);margin-top:4px;}
.total-warn{font-size:10px;color:var(--warn);font-weight:700;margin-top:5px;}
.genel-box{background:var(--navy2);border:2px solid var(--blue);border-radius:12px;padding:14px;margin-bottom:20px;}
.settings-section{background:var(--navy2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px;}
.settings-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:14px;}
.werk-row{background:var(--navy);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;}
.client-chip{display:inline-block;background:var(--navy2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;margin:4px;}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.page{animation:slideUp .2s ease;}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    </div>
    <div id="header-title">ZZP Fatura Takibi</div>
  </div>
  <div id="content"></div>
  <nav id="bottom-nav">
    <button class="nav-btn active" data-tab="dashboard" onclick="showTab('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </button>
    <button class="nav-btn" data-tab="invoices" onclick="showTab('invoices')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
      Faturalar
    </button>
    <button class="nav-btn" data-tab="expenses" onclick="showTab('expenses')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
      Giderler
    </button>
    <button class="nav-btn" data-tab="projects" onclick="showTab('projects')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      Projeler
    </button>
    <button class="nav-btn" data-tab="settings" onclick="showTab('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Ayarlar
    </button>
  </nav>
</div>
<script>
var TASK_TYPES=[{key:'pk',label:'Patchkast geplaatst'},{key:'ka',label:'Aangelegd'},{key:'om',label:'Outlet montage'},{key:'pm',label:'Patchkast montage'},{key:'km',label:'Meten'}];
var KOPER_KEYS=['ka','om','km'];
var INV_STATUSES=['Beklemede','Betaald','Gecikmis','Iptal'];
var PROJ_STATUSES=['Devam Ediyor','Tamamlandi','Bekliyor','Iptal'];
var BTW_RATES=['21','9','0'];
var EXP_CATS_PERSONAL=['Boodschappen','Restaurant en Eten','Kleding','Hypotheek / Huur','Elektriciteit en Gas','Water','Telefoon (Prive)','Internet (Prive)','Zorgverzekering','Auto Verzekering','Brandstof (Prive)','Abonnement / Streaming','Sport en Fitness','Reizen en Vakantie','Diger'];
var EXP_CATS_BUSINESS=['Arac ve Yakit (Zakelijk)','Alet ve Ekipman','Materiaal / Kabel','Telefoon (Zakelijk)','Internet (Zakelijk)','Yazilim ve Abonelik','Beroepsaansprakelijkheid','Pensioen','Opleiding en Cursus','Kantoorbenodigdheden','Belasting / BTW','Diger Zakelijk'];
var DB={get:function(k){try{return JSON.parse(localStorage.getItem('stroomio_'+k)||'[]');}catch(e){return[];}},set:function(k,v){localStorage.setItem('stroomio_'+k,JSON.stringify(v));},getObj:function(k,def){try{return JSON.parse(localStorage.getItem('stroomio_'+k)||JSON.stringify(def));}catch(e){return def;}},setObj:function(k,v){localStorage.setItem('stroomio_'+k,JSON.stringify(v));}};
function fmtEUR(n){return new Intl.NumberFormat('nl-NL',{style:'currency',currency:'EUR'}).format(+n||0);}
function fmtDate(d){return d?new Date(d).toLocaleDateString('nl-NL',{day:'2-digit',month:'2-digit',year:'numeric'}):'-';}
function today(){return new Date().toISOString().split('T')[0];}
function addDays(d,n){var dt=new Date(d);dt.setDate(dt.getDate()+n);return dt.toISOString().split('T')[0];}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function pa(v){if(!v&&v!==0)return 0;return parseFloat(String(v).replace(',','.'))||0;}
function calcBTW(a,r){return Math.round(pa(a)*pa(r)/100*100)/100;}
function getSettings(){return DB.getObj('settings',{name:'Stroomio',address:'Hengelolaan 894',city:"2544GJ 's-Gravenhage",phone:'0653308372',email:'muminmertozturk@hotmail.com',iban:'NL85 KNAB 0777 2058 31',btwNr:'NL005377004B46',kvk:'99233967'});}
function sortInv(inv){return inv.slice().sort(function(a,b){var na=+(String(a.invoiceNo).replace(/[^0-9]/g,''))||0;var nb=+(String(b.invoiceNo).replace(/[^0-9]/g,''))||0;return nb-na;});}
function getTaskPct(t){if(!t)return 0;if(t.nvt)return 0;if(t.done!==undefined){var x=+t.total||1;return x>0?Math.min(Math.round(+t.done/x*100),100):0;}return +t.pct||0;}
function calcLocPct(l){var ts=l.tasks||{};var tot=0,cnt=0;TASK_TYPES.forEach(function(t){var tk=ts[t.key]||{done:0,total:1,nvt:false};if(!tk.nvt){tot+=getTaskPct(tk);cnt++;}});return cnt>0?Math.round(tot/cnt):100;}
function calcProjPct(p){var locs=p.locaties||[];if(!locs.length)return 0;var tot=0;locs.forEach(function(l){tot+=calcLocPct(l);});return Math.round(tot/locs.length);}
function saveCustomer(name,address,btwNr){if(!name)return;var cl=DB.get('customers');if(cl.filter(function(c){return c.name===name;}).length>0)return;cl.unshift({id:uid(),name:name,address:address||'',btwNr:btwNr||''});if(cl.length>20)cl=cl.slice(0,20);DB.set('customers',cl);}
function checkAutoBetaald(){var inv=DB.get('invoices');var ts=today();var am=[];var upd=inv.map(function(i){if(i.status==='Beklemede'&&i.dueDate&&i.dueDate<=ts){am.push({name:i.client,amt:i.amount});i.status='Betaald';i.autoMarked=true;}return i;});if(am.length){DB.set('invoices',upd);sessionStorage.setItem('stroomio_notify',JSON.stringify(am));}}
function notifyBanner(){var raw=sessionStorage.getItem('stroomio_notify');if(!raw)return'';var list=JSON.parse(raw);if(!list.length)return'';var items=list.map(function(x){return'<div style="font-size:12px;color:var(--text);padding:2px 0">- '+x.name+' '+fmtEUR(x.amt)+'</div>';}).join('');return'<div id="notify-banner" class="warn-box"><div style="display:flex;justify-content:space-between"><div><div class="warn-title">Otomatik Betaald yapildi!</div>'+items+'<div style="font-size:11px;color:var(--muted);margin-top:6px">Bu faturalarin gercekten yattigini kontrol et!</div></div><button onclick="dismissNotify()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px">x</button></div></div>';}
function dismissNotify(){sessionStorage.removeItem('stroomio_notify');var el=document.getElementById('notify-banner');if(el)el.remove();}
function badge(s){var m={'Betaald':'badge-green','Beklemede':'badge-warn','Gecikmis':'badge-red','Iptal':'badge-red','Devam Ediyor':'badge-blue','Tamamlandi':'badge-green','Bekliyor':'badge-warn'};return'<span class="badge '+(m[s]||'badge-blue')+'">'+s+'</span>';}
function prog(p){var c=p>=100?'var(--success)':'var(--blue2)';return'<div class="prog-wrap"><div class="prog-bar" style="width:'+Math.min(p,100)+'%;background:'+c+'"></div></div>';}
function addFab(fn){var f=document.createElement('button');f.className='fab';f.innerHTML='<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';f.onclick=fn;document.body.appendChild(f);}
function openSheet(html){var ov=document.createElement('div');ov.className='overlay';ov.innerHTML='<div class="sheet"><div class="sheet-handle"></div>'+html+'</div>';ov.addEventListener('click',function(e){if(e.target===ov)closeSheet();});document.body.appendChild(ov);}
function closeSheet(){var o=document.querySelectorAll('.overlay');if(o.length)o[o.length-1].remove();}
function showTab(tab){document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.toggle('active',b.dataset.tab===tab);});var el=document.getElementById('content');el.scrollTop=0;el.innerHTML='';var fab=document.querySelector('.fab');if(fab)fab.remove();if(tab==='dashboard')renderDashboard();else if(tab==='invoices')renderInvoices();else if(tab==='expenses')renderExpenses();else if(tab==='projects')renderProjects();else if(tab==='settings')renderSettings();}
var res30State=false;
function toggleRes30(){res30State=!res30State;var b=document.getElementById('res30-box');if(b){b.className='chk-box'+(res30State?' checked':'');b.innerHTML=res30State?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>':'';}};
function renderDashboard(){var inv=DB.get('invoices'),expP=DB.get('exp_personal'),expB=DB.get('exp_business'),pro=DB.get('projects');var paid=inv.filter(function(i){return i.status==='Betaald';}).reduce(function(s,i){return s+pa(i.amount);},0);var pend=inv.filter(function(i){return i.status==='Beklemede';}).reduce(function(s,i){return s+pa(i.amount);},0);var totalExp=expP.reduce(function(s,e){return s+pa(e.amount);},0)+expB.reduce(function(s,e){return s+pa(e.amount);},0);var net=paid-totalExp;var activeP=pro.filter(function(p){return calcProjPct(p)<100;}).length;var res=inv.filter(function(i){return i.status==='Betaald'&&i.reserved30;}).reduce(function(s,i){return s+pa(i.amount)*0.3;},0);var unres=inv.filter(function(i){return i.status==='Betaald'&&!i.reserved30;});var unHtml='';if(unres.length){var uI=unres.map(function(i){return'<div style="display:flex;justify-content:space-between;padding:3px 0"><span style="font-size:12px;color:var(--text)">'+i.client+'</span><span style="font-size:12px;color:var(--warn);font-weight:700">'+fmtEUR(pa(i.amount)*0.3)+' ayrilmadi</span></div>';}).join('');unHtml='<div class="warn-box"><div class="warn-title">%30 Ayrilmamis Odemeler</div>'+uI+'</div>';}var recent=sortInv(inv).slice(0,5);var rRows=recent.map(function(i){var w=(i.status==='Betaald'&&!i.reserved30)?'<div class="reserved-warn">%30 ayrilmadi</div>':'';return'<div class="row"><div class="row-main"><div class="row-name">'+i.client+'</div><div class="row-sub">'+i.invoiceNo+' - '+fmtDate(i.date)+'</div></div><div style="text-align:right;flex-shrink:0"><div style="font-size:14px;font-weight:800;color:var(--text)">'+fmtEUR(pa(i.amount))+'</div>'+badge(i.status)+w+'</div></div>';}).join('')||'<div class="empty">Henuz fatura yok</div>';var pRows=pro.slice(0,4).map(function(p){var pct=calcProjPct(p);return'<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:13px;font-weight:700;color:var(--text)">'+p.nam function genBTWReport(){var q=+document.getElementById('btw-q').value;var yr=+document.getElementById('btw-y').value;var qs=['','01-01','04-01','07-01','10-01'];var qe=['','03-31','06-30','09-30','12-31'];var s=yr+'-'+qs[q];var e=yr+'-'+qe[q];var qN=['','Q1 (Januari-Maart)','Q2 (April-Juni)','Q3 (Juli-September)','Q4 (Oktober-December)'];var biz=DB.get('exp_business').filter(function(x){return x.date>=s&&x.date<=e;});var vEx=biz.reduce(function(t,x){return t+pa(x.amount);},0);var vBTW=biz.reduce(function(t,x){return t+pa(x.btwAmount||0);},0);var eR=biz.map(function(x){var b=pa(x.btwAmount||0);var t=pa(x.amount)+b;return'<tr><td>'+fmtDate(x.date)+'</td><td>'+x.description+'</td><td>'+x.category+'</td><td style="text-align:right">'+fmtEUR(pa(x.amount))+'</td><td style="text-align:right">'+(x.btwRate||0)+'%</td><td style="text-align:right">'+fmtEUR(b)+'</td><td style="text-align:right">'+fmtEUR(t)+'</td></tr>';}).join('');var html='<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>BTW Aangifte</title><style>body{font-family:Arial,sans-serif;font-size:12px;margin:20px;}h1{font-size:20px;color:#0d1b2a;}h2{font-size:14px;color:#1a6fbf;margin:20px 0 8px;border-bottom:2px solid #1a6fbf;padding-bottom:4px;}table{width:100%;border-collapse:collapse;margin-bottom:16px;}th{background:#0d1b2a;color:#fff;padding:7px 8px;text-align:left;font-size:11px;}td{padding:6px 8px;border-bottom:1px solid #e5e7eb;font-size:11px;}.sum-box{background:#f3f4f6;border:1px solid #d1d5db;border-radius:8px;padding:16px;margin:16px 0;max-width:420px;}.sum-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid #e5e7eb;}.sum-total{display:flex;justify-content:space-between;padding:10px 0 0;font-size:16px;font-weight:bold;color:#16a34a;}.print-btn{background:#1a6fbf;color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:14px;margin-bottom:16px;}@media print{.print-btn{display:none;}}</style></head><body><button class="print-btn" onclick="window.print()">Yazdir / PDF Kaydet</button><h1>BTW Aangifte - ZZP Fatura Takibi</h1><p>Periode: <strong>'+qN[q]+' '+yr+'</strong></p><div class="sum-box"><div class="sum-row"><span>1a. Omzetbelasting:</span><span>0,00</span></div><div class="sum-row"><span>Zakelijke kosten (ex BTW):</span><span>'+fmtEUR(vEx)+'</span></div><div class="sum-row"><span>5b. Voorbelasting:</span><span>'+fmtEUR(vBTW)+'</span></div><div class="sum-total"><span>Terug te ontvangen:</span><span>'+fmtEUR(vBTW)+'</span></div></div><h2>Zakelijke Kosten</h2><table><thead><tr><th>Datum</th><th>Omschrijving</th><th>Categorie</th><th>Ex BTW</th><th>BTW %</th><th>BTW</th><th>Totaal</th></tr></thead><tbody>'+(eR||'<tr><td colspan="7" style="text-align:center;color:#888">Geen kosten</td></tr>')+'</tbody></table></body></html>';var w=window.open('','_blank');if(w){w.document.write(html);w.document.close();}else{alert('Pop-up engellendi.');}closeSheet();}

function openProjectForm(p){var isE=!!p;var d=p||{name:'',client:'',startDate:today(),endDate:'',status:'Devam Ediyor',value:'',notes:''};var sO=PROJ_STATUSES.map(function(s){return'<option'+(s===d.status?' selected':'')+'>'+s+'</option>';}).join('');var vS=d.value?String(pa(d.value).toFixed(2)).replace('.',','):'';openSheet('<div class="sheet-header"><div class="sheet-title">'+(isE?'Proje Duzenle':'Yeni Proje')+'</div><button class="sheet-close" onclick="closeSheet()">Kapat</button></div><label class="fl">Proje Adi</label><input id="p-name" value="'+d.name+'" placeholder="Harvest House..."/><label class="fl">Musteri</label><input id="p-client" value="'+(d.client||'')+'" placeholder="Musteri Adi"/><div class="grid2"><div><label class="fl">Baslangic</label><input type="date" id="p-start" value="'+d.startDate+'"/></div><div><label class="fl">Bitis</label><input type="date" id="p-end" value="'+(d.endDate||'')+'"/></div></div><label class="fl">Proje Degeri (EUR)</label><input type="text" inputmode="decimal" id="p-val" value="'+vS+'" placeholder="0,00"/><label class="fl">Durum</label><select id="p-status">'+sO+'</select><label class="fl">Notlar</label><textarea id="p-notes" placeholder="Proje detaylari...">'+(d.notes||'')+'</textarea><button class="btn-primary" onclick="saveProject(\''+(isE?d.id:'')+'\''+')">'+(isE?'Guncelle':'Kaydet')+'</button>');}
function saveProject(id){var pro=DB.get('projects');var ex=id?pro.filter(function(p){return p.id===id;})[0]:null;var item={id:id||uid(),name:(document.getElementById('p-name')||{}).value||'',client:(document.getElementById('p-client')||{}).value||'',startDate:(document.getElementById('p-start')||{}).value||'',endDate:(document.getElementById('p-end')||{}).value||'',value:pa((document.getElementById('p-val')||{}).value),status:(document.getElementById('p-status')||{}).value||'',notes:(document.getElementById('p-notes')||{}).value||'',locaties:ex?ex.locaties||[]:[],meerwerk:ex?ex.meerwerk||[]:[],};if(!item.name)return;if(calcProjPct(item)>=100)item.status='Tamamlandi';var upd=id?pro.map(function(p){return p.id===id?item:p;}):[item].concat(pro);DB.set('projects',upd);closeSheet();renderProjects();}
function openProjectDetail(id){var p=DB.get('projects').filter(function(x){return x.id===id;})[0];if(!p)return;var locs=p.locaties||[];var mw=p.meerwerk||[];var pct=calcProjPct(p);var pCol=pct>=100?'var(--success)':'var(--accent)';var lH=locs.map(function(l){var lp=calcLocPct(l);var lc=lp>=100?'var(--success)':'var(--blue2)';var tS=TASK_TYPES.map(function(t){var task=l.tasks&&l.tasks[t.key]?l.tasks[t.key]:{done:0,total:1,nvt:false};if(task.nvt)return'<span style="font-size:10px;color:var(--muted)">'+t.label+': NVT</span>';var tp=getTaskPct(task);var dv=task.done!==undefined?task.done:0;var tv=task.total||1;return'<span style="font-size:10px;color:var(--muted)">'+t.label+': '+dv+'/'+tv+' ('+tp+'%)</span>';}).join(' | ');return'<div class="loc-card" onclick="openLocatieDetail(\''+id+'\',\''+l.id+'\')"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div><div style="font-size:13px;font-weight:700;color:var(--text)">'+l.name+'</div><div style="font-size:11px;color:var(--muted)">'+l.patchkast+(l.type?' - '+l.type:'')+(l.aantal?' | Toplam: '+l.aantal:'')+'</div></div><span style="font-size:15px;font-weight:800;color:'+lc+'">'+lp+'%</span></div>'+prog(lp)+'<div style="margin-top:8px;line-height:2">'+tS+'</div></div>';}).join('')||'<div class="empty">+ Locatie butonuyla locatie ekle</div>';var mwH=mw.map(function(m,i){var mH2=m.materials?'<div><div class="mw-label">Malzeme</div><div class="mw-val">'+m.materials+'</div></div>':'';var hH=m.hours?'<div><div class="mw-label">Sure</div><div class="mw-val">'+m.hours+' saat</div></div>':'';var cH=m.cost?'<div><div class="mw-label">Maliyet</div><div class="mw-val" style="color:var(--warn)">'+fmtEUR(pa(m.cost))+'</div></div>':'';return'<div class="mw-item"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1"><div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:8px">'+m.description+'</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+mH2+hH+cH+'<div><div class="mw-label">Tarih</div><div class="mw-val">'+fmtDate(m.date)+'</div></div></div></div><button onclick="delMeerwerk(\''+id+'\','+i+')" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:20px;padding:0 0 0 10px">x</button></div></div>';}).join('')||'<div class="empty">Henuz meerwerk eklenmedi</div>';var vH=p.value?fmtEUR(pa(p.value)):'-';var nH=p.notes?'<div style="margin-top:16px"><div class="card-title">Notlar</div><div class="stat" style="padding:12px;white-space:pre-wrap;font-size:13px;color:var(--text)">'+p.notes+'</div></div>':'';openSheet('<div class="sheet-header"><div class="sheet-title">'+p.name+'</div><button class="sheet-close" onclick="closeSheet()">Kapat</button></div><div class="grid2" style="margin-bottom:14px"><div class="stat" style="padding:10px 12px"><div class="stat-label">Musteri</div><div style="font-size:13px;font-weight:700;color:var(--text)">'+(p.client||'-')+'</div></div><div class="stat" style="padding:10px 12px"><div class="stat-label">Deger</div><div style="font-size:13px;font-weight:700;color:var(--success)">'+vH+'</div></div><div class="stat" style="padding:10px 12px"><div class="stat-label">Baslangic</div><div style="font-size:12px;color:var(--text)">'+fmtDate(p.startDate)+'</div></div><div class="stat" style="padding:10px 12px"><div class="stat-label">Bitis</div><div style="font-size:12px;color:var(--text)">'+fmtDate(p.endDate)+'</div></div></div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:13px;font-weight:700;color:var(--text)">Genel Ilerleme</span><span style="font-size:18px;font-weight:800;color:'+pCol+'">'+pct+'%</span></div>'+prog(pct)+'<div style="margin-top:20px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div class="card-title" style="margin-bottom:0">Locaties ('+locs.length+')</div><button onclick="openAddLocatie(\''+id+'\')" class="btn-secondary" style="font-size:12px;padding:7px 12px">+ Locatie</button></div>'+lH+'</div><div style="margin-top:20px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div class="card-title" style="margin-bottom:0">Meerwerk</div><button onclick="openMeerwerkForm(\''+id+'\')" class="btn-secondary" style="font-size:12px;padding:7px 12px">+ Ekle</button></div>'+mwH+'</div>'+nH);}
function openAddLocatie(pid){openSheet('<div class="sheet-header"><div class="sheet-title">Locatie Ekle</div><button class="sheet-close" onclick="closeSheet()">Kapat</button></div><label class="fl">Locatie Adi</label><input id="loc-name" placeholder="Locatie adi..."/><div class="grid2"><div><label class="fl">Patchkast Kodu</label><input id="loc-pk" placeholder="H1, H2..."/></div><div><label class="fl">Type</label><input id="loc-type" placeholder="Wandkast 16HE..."/></div></div><button class="btn-primary" onclick="saveLocatie(\''+pid+'\')">Ekle</button>');}
function saveLocatie(pid){var nm=(document.getElementById('loc-name')||{}).value;if(!nm||!nm.trim())return;var pro=DB.get('projects');var p=pro.filter(function(x){return x.id===pid;})[0];if(!p)return;if(!Array.isArray(p.locaties))p.locaties=[];var dT={};TASK_TYPES.forEach(function(t){dT[t.key]={done:0,total:1,nvt:false};});p.locaties.push({id:uid(),name:nm.trim(),patchkast:(document.getElementById('loc-pk')||{}).value||'',type:(document.getElementById('loc-type')||{}).value||'',aantal:1,tasks:dT});DB.set('projects',pro);closeSheet();openProjectDetail(pid);}
function openLocatieDetail(pid,lid){var pro=DB.get('projects');var p=pro.filter(function(x){return x.id===pid;})[0];if(!p)return;var l=(p.locaties||[]).filter(function(x){return x.id===lid;})[0];if(!l)return;var gt=+l.aantal||1;var tH=TASK_TYPES.map(function(t){var task=l.tasks&&l.tasks[t.key]?l.tasks[t.key]:{done:0,total:(t.key==='pk'||t.key==='pm')?1:gt,nvt:false};var nc=task.nvt?'checked':'';var dn=task.done!==undefined?+task.done:0;var tn=task.total!==undefined?+task.total:(t.key==='pk'||t.key==='pm'?1:gt);var pct=tn>0?Math.min(Math.round(dn/tn*100),100):0;var pL=task.nvt?'NVT':pct+'%';var pC=pct>=100?'var(--success)':'var(--accent)';var dS=task.nvt?'opacity:0.4;pointer-events:none':'';var isK=KOPER_KEYS.indexOf(t.key)>=0;var wD=(isK&&!task.nvt&&tn!==gt)?'block':'none';return'<div class="task-block"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-size:14px;font-weight:700;color:var(--text)">'+t.label+'</span><div style="display:flex;align-items:center;gap:10px"><label style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);cursor:pointer"><input type="checkbox" id="nvt-'+t.key+'" '+nc+' style="width:16px;height:16px;accent-color:var(--muted)" onchange="toggleNVT(\''+t.key+'\')"/> N.v.t.</label><span id="pct-label-'+t.key+'" style="font-size:18px;font-weight:800;color:'+pC+';min-width:55px;text-align:right">'+pL+'</span></div></div><div style="'+dS+'" id="inputs-'+t.key+'"><div class="grid2"><div><label class="fl" style="margin-top:0">GEDAAN</label><input type="text" inputmode="numeric" id="done-'+t.key+'" value="'+dn+'" style="text-align:center;font-size:22px;font-weight:800" oninput="updateTaskPct(\''+t.key+'\')"/></div><div><label class="fl" style="margin-top:0">TOTAAL</label><input type="text" inputmode="numeric" id="total-'+t.key+'" value="'+tn+'" style="text-align:center;font-size:22px;font-weight:800" oninput="onTotalChange(\''+t.key+'\')"/></div></div>'+(isK?'<div id="total-warn-'+t.key+'" class="total-warn" style="display:'+wD+'">Genel toplam ile farkli!</div>':'')+'</div></div>';}).join('');openSheet('<div class="sheet-header"><div class="sheet-title">'+l.name+'</div><button class="sheet-close" onclick="closeSheet()">Kapat</button></div><div style="font-size:12px;color:var(--muted);margin-bottom:16px">'+l.patchkast+(l.type?' - '+l.type:'')+'</div><div class="genel-box"><label style="display:block;font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Genel Toplam (Aansluitingen)</label><input type="text" inputmode="numeric" id="genel-toplam" value="'+gt+'" style="font-size:24px;font-weight:800;text-align:center;border-color:var(--blue)" oninput="onGenelToplamChange()"/><div style="font-size:11px;color:var(--muted);margin-top:8px">Bu sayi Aangelegd, Outlet ve Meten icin otomatik toplam olarak kullanilir</div></div>'+tH+'<button class="btn-primary" onclick="saveLocatieTasks(\''+pid+'\',\''+lid+'\')">Kaydet</button><button onclick="delLocatie(\''+pid+'\',\''+lid+'\')" style="width:100%;background:none;border:none;color:var(--danger);font-size:13px;font-family:inherit;cursor:pointer;margin-top:14px;padding:10px">Bu Locatieyi Sil</button>');}
function onGenelToplamChange(){var gt=+(document.getElementById('genel-toplam')||{}).value||1;KOPER_KEYS.forEach(function(k){var tE=document.getElementById('total-'+k);if(tE){tE.value=gt;updateTaskPct(k);checkTotalWarn(k,gt);}});}
function onTotalChange(k){updateTaskPct(k);var gt=+(document.getElementById('genel-toplam')||{}).value||1;checkTotalWarn(k,gt);}
function checkTotalWarn(k,gt){var tE=document.getElementById('total-'+k);var w=document.getElementById('total-warn-'+k);if(!tE||!w)return;w.style.display=(+tE.value!==gt)?'block':'none';}
function updateTaskPct(k){var dn=+(document.getElementById('done-'+k)||{}).value||0;var tn=+(document.getElementById('total-'+k)||{}).value||1;var pct=tn>0?Math.min(Math.round(dn/tn*100),100):0;var lb=document.getElementById('pct-label-'+k);if(lb){lb.textContent=pct+'%';lb.style.color=pct>=100?'var(--success)':'var(--accent)';}}
function toggleNVT(k){var cb=document.getElementById('nvt-'+k);var inp=document.getElementById('inputs-'+k);var lb=document.getElementById('pct-label-'+k);if(!cb)return;if(cb.checked){if(inp){inp.style.opacity='0.4';inp.style.pointerEvents='none';}if(lb)lb.textContent='NVT';}else{if(inp){inp.style.opacity='1';inp.style.pointerEvents='';}updateTaskPct(k);}}
function saveLocatieTasks(pid,lid){var pro=DB.get('projects');var p=pro.filter(function(x){return x.id===pid;})[0];if(!p)return;var li=-1;(p.locaties||[]).forEach(function(l,i){if(l.id===lid)li=i;});if(li<0)return;var gtE=document.getElementById('genel-toplam');p.locaties[li].aantal=gtE?+gtE.value:p.locaties[li].aantal;var nT={};TASK_TYPES.forEach(function(t){var dE=document.getElementById('done-'+t.key);var tE=document.getElementById('total-'+t.key);var cb=document.getElementById('nvt-'+t.key);nT[t.key]={done:dE?+dE.value:0,total:tE?+tE.value:1,nvt:cb?cb.checked:false};});p.locaties[li].tasks=nT;if(calcProjPct(p)>=100)p.status='Tamamlandi';DB.set('projects',pro);closeSheet();openProjectDetail(pid);}
function delLocatie(pid,lid){if(!confirm('Bu locatieyi silmek istiyor musun?'))return;var pro=DB.get('projects');var p=pro.filter(function(x){return x.id===pid;})[0];if(!p)return;p.locaties=(p.locaties||[]).filter(function(l){return l.id!==lid;});DB.set('projects',pro);closeSheet();openProjectDetail(pid);}
function openMeerwerkForm(pid){openSheet('<div class="sheet-header"><div class="sheet-title">Meerwerk Ekle</div><button class="sheet-close" onclick="closeSheet()">Kapat</button></div><label class="fl">Aciklama</label><input id="mw-desc" placeholder="Ekstra kablo cekimi..."/><label class="fl">Kullanilan Malzeme</label><input id="mw-mat" placeholder="2x Cat6a kablo..."/><div class="grid2"><div><label class="fl">Sure (saat)</label><input type="text" inputmode="decimal" id="mw-hours" placeholder="0,0"/></div><div><label class="fl">Maliyet (EUR)</label><input type="text" inputmode="decimal" id="mw-cost" placeholder="0,00"/></div></div><label class="fl">Tarih</label><input type="date" id="mw-date" value="'+today()+'"/><button class="btn-primary" onclick="saveMeerwerk(\''+pid+'\')">Kaydet</button>');}
function saveMeerwerk(pid){var desc=(document.getElementById('mw-desc')||{}).value;if(!desc||!desc.trim())return;var pro=DB.get('projects');var p=pro.filter(function(x){return x.id===pid;})[0];if(!p)return;if(!Array.isArray(p.meerwerk))p.meerwerk=[];p.meerwerk.push({id:uid(),description:desc.trim(),materials:(document.getElementById('mw-mat')||{}).value||'',hours:(document.getElementById('mw-hours')||{}).value||'',cost:pa((document.getElementById('mw-cost')||{}).value),date:(document.getElementById('mw-date')||{}).value||''});DB.set('projects',pro);closeSheet();closeSheet();openProjectDetail(pid);}
function delMeerwerk(pid,i){if(!confirm('Silmek istiyor musun?'))return;var pro=DB.get('projects');var p=pro.filter(function(x){return x.id===pid;})[0];if(!p||!Array.isArray(p.meerwerk))return;p.meerwerk.splice(i,1);DB.set('projects',pro);closeSheet();openProjectDetail(pid);}
function editProject(id){var p=DB.get('projects').filter(function(x){return x.id===id;})[0];if(p)openProjectForm(p);}
function delProject(id){if(!confirm('Silmek istiyor musun?'))return;DB.set('projects',DB.get('projects').filter(function(p){return p.id!==id;}));renderProjects();}
function renderSettings(){var s=getSettings();document.getElementById('content').innerHTML='<div class="page"><div class="page-title">Ayarlar</div><div class="settings-section"><div class="settings-title">Bedrijfsgegevens</div><label class="fl">Bedrijfsnaam</label><input id="s-name" value="'+s.name+'"/><label class="fl">Adres</label><input id="s-address" value="'+s.address+'"/><label class="fl">Stad / Postcode</label><input id="s-city" value="'+s.city+'"/><label class="fl">Telefoon</label><input id="s-phone" value="'+s.phone+'" inputmode="tel"/><label class="fl">E-mail</label><input id="s-email" value="'+s.email+'" inputmode="email"/><label class="fl">IBAN</label><input id="s-iban" value="'+s.iban+'"/><label class="fl">BTW Nummer</label><input id="s-btwNr" value="'+s.btwNr+'"/><label class="fl">KvK Nummer</label><input id="s-kvk" value="'+s.kvk+'"/><button class="btn-primary" onclick="saveSettings()">Kaydet</button></div><div class="settings-section"><div class="settings-title">Kayitli Musteriler</div><div id="client-list"></div></div></div>';renderClientList();}
function renderClientList(){var c=document.getElementById('client-list');if(!c)return;var cl=DB.get('customers');if(!cl.length){c.innerHTML='<div class="empty">Fatura kaydedince musteriler otomatik eklenir</div>';return;}c.innerHTML=cl.map(function(x){return'<div class="row"><div class="row-main"><div class="row-name">'+x.name+'</div><div class="row-sub">'+(x.address||'')+'</div></div><button onclick="delClient(\''+x.id+'\')" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:18px;padding:0">x</button></div>';}).join('');}
function delClient(id){DB.set('customers',DB.get('customers').filter(function(c){return c.id!==id;}));renderClientList();}
function saveSettings(){var s={name:(document.getElementById('s-name')||{}).value||'Stroomio',address:(document.getElementById('s-address')||{}).value||'',city:(document.getElementById('s-city')||{}).value||'',phone:(document.getElementById('s-phone')||{}).value||'',email:(document.getElementById('s-email')||{}).value||'',iban:(document.getElementById('s-iban')||{}).value||'',btwNr:(document.getElementById('s-btwNr')||{}).value||'',kvk:(document.getElementById('s-kvk')||{}).value||''};DB.setObj('settings',s);var btn=document.querySelector('#content .btn-primary');if(btn){var orig=btn.textContent;btn.textContent='Kaydedildi!';btn.style.background='var(--success)';setTimeout(function(){btn.textContent=orig;btn.style.background='';},2000);}}
checkAutoBetaald();
showTab('dashboard');
</script>
</body>

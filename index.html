<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Stroomio"/>
<meta name="theme-color" content="#0d1b2a"/>
<title>Stroomio</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--navy:#0d1b2a;--navy2:#122035;--navy3:#1a2d42;--blue:#1a6fbf;--blue2:#2589e0;--accent:#4fc3f7;--success:#22c55e;--warn:#f59e0b;--danger:#ef4444;--text:#e2eaf4;--muted:#7a9bbf;--border:#1e3352;--safe-bottom:env(safe-area-inset-bottom,0px);--safe-top:env(safe-area-inset-top,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--navy);font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);overflow:hidden;}
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top);}
#header{background:var(--navy3);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
#header-logo{width:32px;height:32px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#header-title{font-size:17px;font-weight:800;color:var(--text);}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;}
#bottom-nav{background:var(--navy3);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);flex-shrink:0;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 2px;border:none;background:none;color:var(--muted);font-size:9px;font-family:inherit;font-weight:600;cursor:pointer;}
.nav-btn.active{color:var(--blue2);}
.nav-btn svg{width:20px;height:20px;}
.card{background:var(--navy2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
.card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat{background:var(--navy2);border:1px solid var(--border);border-radius:12px;padding:14px;}
.stat-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.stat-val{font-size:18px;font-weight:800;}
.row{display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);}
.row:last-child{border-bottom:none;}
.row-main{flex:1;min-width:0;}
.row-name{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;}
.badge-green{background:#22c55e22;color:#22c55e;border:1px solid #22c55e44;}
.badge-warn{background:#f59e0b22;color:#f59e0b;border:1px solid #f59e0b44;}
.badge-red{background:#ef444422;color:#ef4444;border:1px solid #ef444444;}
.badge-blue{background:#2589e022;color:#2589e0;border:1px solid #2589e044;}
.prog-wrap{background:var(--border);border-radius:99px;height:7px;overflow:hidden;}
.prog-bar{height:100%;border-radius:99px;transition:width .4s ease;}
.fab{position:fixed;right:18px;bottom:calc(70px + var(--safe-bottom));width:52px;height:52px;background:var(--blue);border-radius:16px;border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px #1a6fbf55;z-index:10;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:flex-end;}
.sheet{background:var(--navy3);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 18px calc(20px + var(--safe-bottom));}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 18px;}
.sheet-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.sheet-title{font-size:17px;font-weight:800;color:var(--text);}
.sheet-close{background:var(--navy2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--muted);cursor:pointer;font-size:13px;font-family:inherit;}
label.fl{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;margin-top:14px;}
input,select,textarea{width:100%;background:var(--navy);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-size:15px;font-family:inherit;outline:none;appearance:none;-webkit-appearance:none;}
input:focus,select:focus,textarea:focus{border-color:var(--blue2);}
textarea{resize:vertical;min-height:70px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-primary{width:100%;background:var(--blue);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;margin-top:18px;}
.btn-secondary{background:var(--navy2);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:9px 14px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}
.btn-row{display:flex;gap:8px;margin-top:6px;}
.btn-sm{padding:7px;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.btn-pay{background:#22c55e22;color:#22c55e;border:1px solid #22c55e44;}
.btn-edit{background:#2589e022;color:#2589e0;border:1px solid #2589e044;}
.btn-del{background:#ef444422;color:#ef4444;border:1px solid #ef444444;}
.chk-row{display:flex;align-items:center;gap:14px;background:var(--navy);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:14px;}
.chk-box{width:24px;height:24px;border-radius:6px;border:2px solid var(--blue2);background:transparent;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.chk-box.checked{background:var(--success);border-color:var(--success);}
.page-title{font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px;}
.page-sub{font-size:12px;color:var(--muted);margin-bottom:16px;}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:24px 0;}
.warn-box{background:#f59e0b18;border:1px solid #f59e0b44;border-radius:12px;padding:12px 14px;margin-bottom:12px;}
.warn-title{color:#f59e0b;font-weight:800;font-size:13px;margin-bottom:6px;}
.reserved-warn{font-size:10px;color:var(--warn);font-weight:700;margin-top:3px;}
.loc-card{background:var(--navy);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;}
.mw-item{background:var(--navy);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;}
.mw-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.mw-val{font-size:13px;color:var(--text);font-weight:600;margin-top:2px;}
.task-block{background:var(--navy);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;}
.subtab-wrap{display:flex;background:var(--navy2);border-radius:10px;padding:4px;margin-bottom:16px;border:1px solid var(--border);}
.subtab{flex:1;padding:9px 4px;border:none;background:none;color:var(--muted);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;border-radius:7px;}
.subtab.active{background:var(--blue);color:#fff;}
.btw-info{font-size:11px;color:var(--muted);margin-top:4px;}
.total-warn{font-size:10px;color:var(--warn);font-weight:700;margin-top:5px;}
.genel-box{background:var(--navy2);border:2px solid var(--blue);border-radius:12px;padding:14px;margin-bottom:20px;}
.settings-section{background:var(--navy2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px;}
.settings-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:14px;}
.doc-folder{background:var(--navy);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;}
.doc-folder-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.doc-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.doc-item:last-child{border-bottom:none;}
.doc-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.doc-inv{background:#2589e022;}
.doc-exp{background:#f59e0b22;}
.loading-overlay{position:fixed;inset:0;background:rgba(13,27,42,.85);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue2);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.page{animation:slideUp .2s ease;}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    </div>
    <div id="header-title">ZZP Fatura Takibi</div>
  </div>
  <div id="content"></div>
  <nav id="bottom-nav">
    <button class="nav-btn active" data-tab="dashboard" onclick="showTab('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </button>
    <button class="nav-btn" data-tab="invoices" onclick="showTab('invoices')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
      Faturalar
    </button>
    <button class="nav-btn" data-tab="expenses" onclick="showTab('expenses')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
      Giderler
    </button>
    <button class="nav-btn" data-tab="projects" onclick="showTab('projects')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      Projeler
    </button>
    <button class="nav-btn" data-tab="settings" onclick="showTab('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Ayarlar
    </button>
  </nav>
</div>
<script>
var TASK_TYPES=[{key:'pk',label:'Patchkast geplaatst'},{key:'ka',label:'Aangelegd'},{key:'om',label:'Outlet montage'},{key:'pm',label:'Patchkast montage'},{key:'km',label:'Meten'}];
var KOPER_KEYS=['ka','om','km'];
var INV_STATUSES=['Beklemede','Betaald','Gecikmis','Iptal'];
var PROJ_STATUSES=['Devam Ediyor','Tamamlandi','Bekliyor','Iptal'];
var BTW_RATES=['21','9','0'];
var EXP_CATS_PERSONAL=['Boodschappen','Restaurant en Eten','Kleding','Hypotheek / Huur','Elektriciteit en Gas','Water','Telefoon (Prive)','Internet (Prive)','Zorgverzekering','Auto Verzekering','Brandstof (Prive)','Abonnement / Streaming','Sport en Fitness','Reizen en Vakantie','Diger'];
var EXP_CATS_BUSINESS=['Arac ve Yakit (Zakelijk)','Alet ve Ekipman','Materiaal / Kabel','Telefoon (Zakelijk)','Internet (Zakelijk)','Yazilim ve Abonelik','Beroepsaansprakelijkheid','Pensioen','Opleiding en Cursus','Kantoorbenodigdheden','Belasting / BTW','Diger Zakelijk'];
var DB={get:function(k){try{return JSON.parse(localStorage.getItem('stroomio_'+k)||'[]');}catch(e){return[];}},set:function(k,v){localStorage.setItem('stroomio_'+k,JSON.stringify(v));},getObj:function(k,def){try{return JSON.parse(localStorage.getItem('stroomio_'+k)||JSON.stringify(def));}catch(e){return def;}},setObj:function(k,v){localStorage.setItem('stroomio_'+k,JSON.stringify(v));}};
function fmtEUR(n){return new Intl.NumberFormat('nl-NL',{style:'currency',currency:'EUR'}).format(+n||0);}
function fmtDate(d){return d?new Date(d).toLocaleDateString('nl-NL',{day:'2-digit',month:'2-digit',year:'numeric'}):'-';}
function fmtMonth(ym){var p=ym.split('-');var m=['Ocak','Subat','Mart','Nisan','Mayis','Haziran','Temmuz','Agustos','Eylul','Ekim','Kasim','Aralik'];return m[(+p[1]||1)-1]+' '+p[0];}
function today(){return new Date().toISOString().split('T')[0];}
function addDays(d,n){var dt=new Date(d);dt.setDate(dt.getDate()+n);return dt.toISOString().split('T')[0];}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function pa(v){if(!v&&v!==0)return 0;return parseFloat(String(v).replace(',','.'))||0;}
function calcBTW(a,r){return Math.round(pa(a)*pa(r)/100*100)/100;}
function getRate(){return pa(DB.getObj('settings',{hourlyRate:0}).hourlyRate);}
function sortInv(inv){return inv.slice().sort(function(a,b){var na=+(String(a.invoiceNo).replace(/[^0-9]/g,''))||0;var nb=+(String(b.invoiceNo).replace(/[^0-9]/g,''))||0;return nb-na;});}
function getTaskPct(t){if(!t)return 0;if(t.nvt)return 0;if(t.done!==undefined){var x=+t.total||1;return x>0?Math.min(Math.round(+t.done/x*100),100):0;}return +t.pct||0;}
function calcLocPct(l){var ts=l.tasks||{};var tot=0,cnt=0;TASK_TYPES.forEach(function(t){var tk=ts[t.key]||{done:0,total:1,nvt:false};if(!tk.nvt){tot+=getTaskPct(tk);cnt++;}});return cnt>0?Math.round(tot/cnt):100;}
function calcProjPct(p){var locs=p.locaties||[];if(!locs.length)return 0;var tot=0;locs.forEach(function(l){tot+=calcLocPct(l);});return Math.round(tot/locs.length);}
function showLoading(msg){var el=document.createElement('div');el.id='loading-overlay';el.className='loading-overlay';el.innerHTML='<div class="spinner"></div><div style="color:var(--text);font-size:14px;font-weight:700">'+(msg||'Islem yapiliyor...')+'</div>';document.body.appendChild(el);}
function hideLoading(){var el=document.getElementById('loading-overlay');if(el)el.remove();}
function checkAutoBetaald(){var inv=DB.get('invoices');var ts=today();var am=[];var upd=inv.map(function(i){if(i.status==='Beklemede'&&i.dueDate&&i.dueDate<=ts){am.push({name:i.client,amt:i.amount});i.status='Betaald';i.autoMarked=true;}return i;});if(am.length){DB.set('invoices',upd);sessionStorage.setItem('stroomio_notify',JSON.stringify(am));}}
function notifyBanner(){var raw=sessionStorage.getItem('stroomio_notify');if(!raw)return'';var list=JSON.parse(raw);if(!list.length)return'';var items=list.map(function(x){return'<div style="font-size:12px;color:var(--text);padding:2px 0">- '+x.name+' '+fmtEUR(x.amt)+'</div>';}).join('');return'<div id="notify-banner" class="warn-box"><div style="display:flex;justify-content:space-between"><div><div class="warn-title">Otomatik Betaald yapildi!</div>'+items+'<div style="font-size:11px;color:var(--muted);margin-top:6px">Bu faturalarin gercekten yattigini kontrol et!</div></div><button onclick="dismissNotify()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px">x</button></div></div>';}
function dismissNotify(){sessionStorage.removeItem('stroomio_notify');var el=document.getElementById('notify-banner');if(el)el.remove();}
function badge(s){var m={'Betaald':'badge-green','Beklemede':'badge-warn','Gecikmis':'badge-red','Iptal':'badge-red','Devam Ediyor':'badge-blue','Tamamlandi':'badge-green','Bekliyor':'badge-warn'};return'<span class="badge '+(m[s]||'badge-blue')+'">'+s+'</span>';}
function prog(p){var c=p>=100?'var(--success)':'var(--blue2)';return'<div class="prog-wrap"><div class="prog-bar" style="width:'+Math.min(p,100)+'%;background:'+c+'"></div></div>';}
function addFab(fn){var f=document.createElement('button');f.className='fab';f.innerHTML='<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';f.onclick=fn;document.body.appendChild(f);}
function openSheet(html){var ov=document.createElement('div');ov.className='overlay';ov.innerHTML='<div class="sheet"><div class="sheet-handle"></div>'+html+'</div>';ov.addEventListener('click',function(e){if(e.target===ov)closeSheet();});document.body.appendChild(ov);}
function closeSheet(){var o=document.querySelectorAll('.overlay');if(o.length)o[o.length-1].remove();}
function showTab(tab){document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.toggle('active',b.dataset.tab===tab);});var el=document.getElementById('content');el.scrollTop=0;el.innerHTML='';var fab=document.querySelector('.fab');if(fab)fab.remove();if(tab==='dashboard')renderDashboard();else if(tab==='invoices')renderInvoices();else if(tab==='expenses')renderExpenses();else if(tab==='projects')renderProjects();else if(tab==='settings')renderSettings();}
var res30State=false;
function toggleRes30(){res30State=!res30State;var b=document.getElementById('res30-box');if(b){b.className='chk-box'+(res30State?' checked':'');b.innerHTML=res30State?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>':'';}};
  function renderDashboard(){var inv=DB.get('invoices'),expP=DB.get('exp_personal'),expB=DB.get('exp_business'),pro=DB.get('projects');var paid=inv.filter(function(i){return i.status==='Betaald';}).reduce(function(s,i){return s+pa(i.amount);},0);var pend=inv.filter(function(i){return i.status==='Beklemede';}).reduce(function(s,i){return s+pa(i.amount);},0);var totalExp=expP.reduce(function(s,e){return s+pa(e.amount);},0)+expB.reduce(function(s,e){return s+pa(e.amount);},0);var net=paid-totalExp;var activeP=pro.filter(function(p){return calcProjPct(p)<100;}).length;var reservedTotal=inv.filter(function(i){return i.status==='Betaald'&&i.reserved30;}).reduce(function(s,i){return s+pa(i.amount)*0.3;},0);var unreserved=inv.filter(function(i){return i.status==='Betaald'&&!i.reserved30;});var unHtml='';if(unreserved.length){var uI=unreserved.map(function(i){return'<div style="display:flex;justify-content:space-between;padding:3px 0"><span style="font-size:12px;color:var(--text)">'+i.client+'</span><span style="font-size:12px;color:var(--warn);font-weight:700">'+fmtEUR(pa(i.amount)*0.3)+' ayrilmadi</span></div>';}).join('');unHtml='<div class="warn-box"><div class="warn-title">%30 Ayrilmamis Odemeler</div>'+uI+'</div>';}var sorted=sortInv(inv);var recentRows=sorted.slice(0,5).map(function(i){var w30=(i.status==='Betaald'&&!i.reserved30)?'<div class="reserved-warn">%30 ayrilmadi</div>':'';return'<div class="row"><div class="row-main"><div class="row-name">'+i.client+'</div><div class="row-sub">'+i.invoiceNo+' - '+fmtDate(i.date)+'</div></div><div style="text-align:right;flex-shrink:0"><div style="font-size:14px;font-weight:800;color:var(--text)">'+fmtEUR(pa(i.amount))+'</div>'+badge(i.status)+w30+'</div></div>';}).join('')||'<div class="empty">Henuz fatura yok</div>';var proRows=pro.slice(0,4).map(function(p){var pct=calcProjPct(p);return'<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:13px;font function renderInvoices(){var inv=sortInv(DB.get('invoices'));var total=inv.reduce(function(s,i){return s+pa(i.amount);},0);var paid=inv.filter(function(i){return i.status==='Betaald';}).reduce(function(s,i){return s+pa(i.amount);},0);var rows=inv.map(function(i){var res=i.reserved30?'<div style="font-size:10px;color:var(--success);margin-top:3px;font-weight:700">%30 Ayrildi ('+fmtEUR(pa(i.amount)*0.3)+')</div>':(i.status==='Betaald'?'<div class="reserved-warn">%30 Ayrilmadi</div>':'');var hInfo=i.hours?'<div class="row-sub">'+i.hours+'u x '+fmtEUR(i.rate||getRate())+'/u</div>':'';var pb=i.status!=='Betaald'?'<button class="btn-sm btn-pay" onclick="markPaid(\''+i.id+'\')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></button>':'';var due=i.dueDate?' - Son: '+fmtDate(i.dueDate):'';return'<div class="row"><div class="row-main"><div class="row-name">'+i.client+'</div><div class="row-sub">'+i.invoiceNo+' - '+fmtDate(i.date)+due+'</div>'+hInfo+(i.description?'<div class="row-sub">'+i.description+'</div>':'')+res+'</div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0"><div style="font-size:15px;font-weight:800;color:var(--text)">'+fmtEUR(pa(i.amount))+'</div>'+badge(i.status)+'<div class="btn-row" style="margin-top:0">'+pb+'<button class="btn-sm btn-edit" onclick="editInvoice(\''+i.id+'\')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4z"/></svg></button><button class="btn-sm btn-del" onclick="delInvoice(\''+i.id+'\')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2 function updateTaskPct(k){var dn=+(document.getElementById('done-'+k)||{}).value||0;var tn=+(document.getElementById('total-'+k)||{}).value||1;var pct=tn>0?Math.min(Math.round(dn/tn*100),100):0;var lb=document.getElementById('pct-label-'+k);if(lb){lb.textContent=pct+'%';lb.style.color=pct>=100?'var(--success)':'var(--accent)';}}
function toggleNVT(k){var cb=document.getElementById('nvt-'+k);var inp=document.getElementById('inputs-'+k);var lb=document.getElementById('pct-label-'+k);if(!cb)return;if(cb.checked){if(inp){inp.style.opacity='0.4';inp.style.pointerEvents='none';}if(lb)lb.textContent='NVT';}else{if(inp){inp.style.opacity='1';inp.style.pointerEvents='';}updateTaskPct(k);}}
function saveLocatieTasks(pid,lid){var pro=DB.get('projects');var p=pro.filter(function(x){return x.id===pid;})[0];if(!p)return;var li=-1;(p.locaties||[]).forEach(function(l,i){if(l.id===lid)li=i;});if(li<0)return;var gtE=document.getElementById('genel-toplam');p.locaties[li].aantal=gtE?+gtE.value:p.locaties[li].aantal;var nT={};TASK_TYPES.forEach(function(t){var dE=document.getElementById('done-'+t.key);var tE=document.getElementById('total-'+t.key);var cb=document.getElementById('nvt-'+t.key);nT[t.key]={done:dE?+dE.value:0,total:tE?+tE.value:1,nvt:cb?cb.checked:false};});p.locaties[li].tasks=nT;if(calcProjPct(p)>=100)p.status='Tamamlandi';DB.set('projects',pro);closeSheet();openProjectDetail(pid);}
function delLocatie(pid,lid){if(!confirm('Bu locatieyi silmek istiyor musun?'))return;var pro=DB.get('projects');var p=pro.filter(function(x){return x.id===pid;})[0];if(!p)return;p.locaties=(p.locaties||[]).filter(function(l){return l.id!==lid;});DB.set('projects',pro);closeSheet();openProjectDetail(pid);}
function openMeerwerkForm(pid){openSheet('<div class="sheet-header"><div class="sheet-title">Meerwerk Ekle</div><button class="sheet-close" onclick="closeSheet()">Kapat</button></div><label class="fl">Aciklama</label><input id="mw-desc" placeholder="Ekstra kablo cekimi..."/><label class="fl">Kullanilan Malzeme</label><input id="mw-mat" placeholder="2x Cat6a kablo..."/><div class="grid2"><div><label class="fl">Sure (saat)</label><input type="text" inputmode="decimal" id="mw-hours" placeholder="0,0"/></div><div><label class="fl">Maliyet (EUR)</label><input type="text" inputmode="decimal" id="mw-cost" placeholder="0,00"/></div></div><label class="fl">Tarih</label><input type="date" id="mw-date" value="'+today()+'"/><button class="btn-primary" onclick="saveMeerwerk(\''+pid+'\')">Kaydet</button>');}
function saveMeerwerk(pid){var desc=(document.getElementById('mw-desc')||{}).value;if(!desc||!desc.trim())return;var pro=DB.get('projects');var p=pro.filter(function(x){return x.id===pid;})[0];if(!p)return;if(!Array.isArray(p.meerwerk))p.meerwerk=[];p.meerwerk.push({id:uid(),description:desc.trim(),materials:(document.getElementById('mw-mat')||{}).value||'',hours:(document.getElementById('mw-hours')||{}).value||'',cost:pa((document.getElementById('mw-cost')||{}).value),date:(document.getElementById('mw-date')||{}).value||''});DB.set('projects',pro);closeSheet();closeSheet();openProjectDetail(pid);}
function delMeerwerk(pid,i){if(!confirm('Silmek istiyor musun?'))return;var pro=DB.get('projects');var p=pro.filter(function(x){return x.id===pid;})[0];if(!p||!Array.isArray(p.meerwerk))return;p.meerwerk.splice(i,1);DB.set('projects',pro);closeSheet();openProjectDetail(pid);}
function editProject(id){var p=DB.get('projects').filter(function(x){return x.id===id;})[0];if(p)openProjectForm(p);}
function delProject(id){if(!confirm('Silmek istiyor musun?'))return;DB.set('projects',DB.get('projects').filter(function(p){return p.id!==id;}));renderProjects();}
function renderSettings(){var s=DB.getObj('settings',{hourlyRate:0});var rV=s.hourlyRate?String(pa(s.hourlyRate).toFixed(2)).replace('.',','):'';var docs=DB.get('documents');var invDocs=docs.filter(function(d){return d.type==='invoice';});var expDocs=docs.filter(function(d){return d.type==='expense';});function groupByMonth(arr){var g={};arr.forEach(function(d){var ym=d.date?d.date.slice(0,7):'bilinmiyor';if(!g[ym])g[ym]=[];g[ym].push(d);});return g;}function renderDocGroup(arr,typeLabel,color){if(!arr.length)return'<div class="empty">Henuz '+typeLabel.toLowerCase()+' belgesi yok</div>';var g=groupByMonth(arr);var keys=Object.keys(g).sort().reverse();return keys.map(function(ym){var items=g[ym].map(function(d){return'<div class="doc-item"><div class="doc-icon '+(d.type==='invoice'?'doc-inv':'doc-exp')+'"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg></div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+d.filename+'</div><div style="font-size:11px;color:var(--muted)">'+fmtDate(d.date)+(d.linkedName?' - '+d.linkedName:'')+'</div></div><button onclick="viewDoc(\''+d.id+'\')" style="background:var(--blue);color:#fff;border:none;border-radius:7px;padding:6px 10px;font-size:11px;font-family:inherit;cursor:pointer;flex-shrink:0">Ac</button></div>';}).join('');return'<div class="doc-folder"><div class="doc-folder-title">'+fmtMonth(ym)+'</div>'+items+'</div>';}).join('');}document.getElementById('content').innerHTML='<div class="page"><div class="page-title">Ayarlar</div><div class="settings-section"><div class="settings-title">Saatlik Ucret</div><label class="fl">Saatlik Ucret (EUR)</label><input type="text" inputmode="decimal" id="s-rate" value="'+rV+'" placeholder="0,00" style="font-size:22px;font-weight:800;text-align:center"/><button class="btn-primary" onclick="saveSettings()" style="margin-top:12px">Kaydet</button></div><div class="settings-section"><div class="settings-title">PDF Yukle</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px"><button onclick="triggerUpload(\'invoice\')" style="background:var(--navy);border:1px solid var(--blue2);color:var(--blue2);border-radius:10px;padding:14px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer"><div style="font-size:20px;margin-bottom:4px">Fatura PDF</div><div style="font-size:10px;color:var(--muted);margin-top:2px">Kendi faturam</div></button><button onclick="triggerUpload(\'expense\')" style="background:var(--navy);border:1px solid var(--warn);color:var(--warn);border-radius:10px;padding:14px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer"><div style="font-size:20px;margin-bottom:4px">Gider PDF</div><div style="font-size:10px;color:var(--muted);margin-top:2px">Aldigim fatura</div></button></div><input type="file" id="pdf-upload" accept=".pdf" style="display:none" onchange="handlePDFUpload()"/><div style="font-size:11px;color:var(--muted)">PDF yuklence Claude otomatik okur ve ilgili formu doldurur.</div></div><div class="settings-section"><div class="settings-title">Yuklenen Belgeler</div><div style="margin-bottom:16px"><div style="font-size:12px;font-weight:700;color:var(--blue2);margin-bottom:8px">FATURALAR ('+invDocs.length+')</div>'+renderDocGroup(invDocs,'Fatura','#2589e0')+'</div><div><div style="font-size:12px;font-weight:700;color:var(--warn);margin-bottom:8px">GIDERLER ('+expDocs.length+')</div>'+renderDocGroup(expDocs,'Gider','#f59e0b')+'</div></div></div>';}
function saveSettings(){var rate=pa((document.getElementById('s-rate')||{}).value);DB.setObj('settings',{hourlyRate:rate});var el=document.getElementById('s-rate');if(el){el.style.borderColor='var(--success)';setTimeout(function(){el.style.borderColor='';},1500);}}
var currentUploadType='invoice';
function triggerUpload(type){currentUploadType=type;var inp=document.getElementById('pdf-upload');if(inp)inp.click();}
function handlePDFUpload(){var inp=document.getElementById('pdf-upload');if(!inp||!inp.files||!inp.files[0])return;var file=inp.files[0];if(file.size>8*1024*1024){alert('PDF cok buyuk (max 8MB).');return;}var reader=new FileReader();reader.onload=function(ev){var b64=ev.target.result.split(',')[1];processPDF(b64,file.name,currentUploadType);};reader.readAsDataURL(file);inp.value='';}
async function processPDF(b64,filename,type){showLoading('PDF okunuyor...');var isInv=type==='invoice';var prompt=isInv?'Bu bir fatura PDF. Sadece JSON don: {"client":"musteri adi","invoiceNo":"fatura no","date":"YYYY-MM-DD","dueDate":"YYYY-MM-DD","amount":123.45,"description":"aciklama"}. Amount ex-BTW sayi olsun. Tarih yoksa "'+today()+'" kullan.':'Bu bir gider faturasi PDF. Sadece JSON don: {"description":"ne alindi","date":"YYYY-MM-DD","amount":123.45,"btwAmount":25.92,"btwRate":21,"category":"kategori"}. Kategori: Arac ve Yakit (Zakelijk), Alet ve Ekipman, Materiaal / Kabel, Kantoorbenodigdheden, Diger Zakelijk. Amount ex-BTW olsun. Tarih yoksa "'+today()+'" kullan.';try{var resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true','anthropic-beta':'pdfs-2024-09-25'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:prompt}]}]})});if(!resp.ok){var err=await resp.json().catch(function(){return{};});throw new Error('API Hata '+resp.status+': '+(err.error&&err.error.message||resp.statusText));}var data=await resp.json();var txt=data.content&&data.content[0]?data.content[0].text||'':'';var clean=txt.replace(/```json|```/g,'').trim();var match=clean.match(/\{[\s\S]*\}/);if(match)clean=match[0];var parsed=JSON.parse(clean);hideLoading();var docs=DB.get('documents');var docId=uid();docs.push({id:docId,type:type,filename:filename,date:parsed.date||today(),b64:b64,linkedName:parsed.client||parsed.description||filename,linkedId:null});DB.set('documents',docs);if(isInv){openInvoiceForm(null,{client:parsed.client||'',invoiceNo:parsed.invoiceNo||'STR-'+Date.now().toString().slice(-4),date:parsed.date||today(),dueDate:parsed.dueDate||addDays(parsed.date||today(),30),amount:parsed.amount||0,rate:getRate(),hours:0,description:parsed.description||''});}else{openExpenseForm(null,'business',{description:parsed.description||'',date:parsed.date||today(),amount:parsed.amount||0,btwAmount:parsed.btwAmount||0,btwRate:String(parsed.btwRate||21),category:parsed.category||EXP_CATS_BUSINESS[0],note:filename});}}catch(err){hideLoading();console.error('PDF error:',err);alert('PDF okunamadi.\n'+err.message+'\n\nBilgileri elle girebilirsin.');if(isInv)openInvoiceForm(null);else openExpenseForm(null,'business');}}
function viewDoc(id){var docs=DB.get('documents');var d=docs.filter(function(x){return x.id===id;})[0];if(!d)return;try{var b=atob(d.b64);var arr=new Uint8Array(b.length);for(var i=0;i<b.length;i++)arr[i]=b.charCodeAt(i);var blob=new Blob([arr],{type:'application/pdf'});var url=URL.createObjectURL(blob);window.open(url,'_blank');}catch(e){alert('PDF acilamadi.');}}
checkAutoBetaald();
showTab('dashboard');
</script>
